$schema: "https://moonrepo.dev/schemas/project.json"

id: "source-inputs"
language: "unknown"
layer: "configuration"
stack: "systems"
tags: ["sources"]

project:
  title: "Source Inputs"
  description: "Neutral source checkout materialization for PostgreSQL, runtime dependencies, toolchains, and extension-owned sources."
  owner: "oliphaunt"

owners:
  defaultOwner: "@oliphaunt/core"
  paths:
    "**/*": ["@oliphaunt/core"]

tasks:
  source-fetch:
    tags: ["source", "fetch"]
    command: "bun tools/policy/fetch-sources.mjs all"
    inputs:
      - "/src/sources/**/*"
      - "/src/extensions/external/**/source.toml"
      - "/src/extensions/external/**/dependencies/**/source.toml"
      - "/src/runtimes/liboliphaunt/wasix/assets/build/docker/Dockerfile"
      - "/tools/policy/fetch-sources.mjs"
    options:
      cache: false
      runFromWorkspaceRoot: true
  source-fetch-native-runtime:
    tags: ["source", "fetch"]
    command: "bun tools/policy/fetch-sources.mjs native-runtime"
    inputs:
      - "/src/sources/third-party/shared/**/*"
      - "/src/sources/third-party/native/**/*"
      - "/src/extensions/external/**/source.toml"
      - "/src/extensions/external/**/dependencies/**/source.toml"
      - "/tools/policy/fetch-sources.mjs"
    options:
      cache: false
      runFromWorkspaceRoot: true
  source-fetch-wasix-runtime:
    tags: ["source", "fetch"]
    command: "bun tools/policy/fetch-sources.mjs wasix-runtime"
    inputs:
      - "/src/sources/toolchains/**/*"
      - "/src/sources/third-party/shared/**/*"
      - "/src/sources/third-party/wasix/**/*"
      - "/src/extensions/external/**/source.toml"
      - "/src/extensions/external/**/dependencies/**/source.toml"
      - "/src/runtimes/liboliphaunt/wasix/assets/build/docker/Dockerfile"
      - "/tools/policy/fetch-sources.mjs"
    options:
      cache: false
      runFromWorkspaceRoot: true
  source-fetch-extensions:
    tags: ["source", "fetch"]
    command: "bun tools/policy/fetch-sources.mjs extensions"
    inputs:
      - "/src/extensions/external/**/source.toml"
      - "/src/extensions/external/**/dependencies/**/source.toml"
      - "/tools/policy/fetch-sources.mjs"
    options:
      cache: false
      runFromWorkspaceRoot: true
