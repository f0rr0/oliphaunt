$schema: "https://moonrepo.dev/schemas/project.json"

id: "source-toolchains"
language: "unknown"
layer: "configuration"
stack: "systems"
tags: ["sources", "toolchain"]

project:
  title: "Source Toolchains"
  description: "Pinned compiler, runtime, and container metadata for source builds."
  owner: "oliphaunt"

owners:
  defaultOwner: "@oliphaunt/core"
  paths:
    "**/*": ["@oliphaunt/core"]

tasks:
  check:
    tags: ["quality", "static"]
    command: "bun tools/policy/assertions/assert-source-inputs.mjs toolchains"
    inputs:
      - "/.prototools"
      - "/.moon/toolchains.yml"
      - "/.github/workflows/ci.yml"
      - "/.github/workflows/mobile-e2e.yml"
      - "/.github/workflows/release-execute.yml"
      - "/.github/actions/setup-android/action.yml"
      - "/.github/actions/setup-bun/action.yml"
      - "/.github/actions/setup-deno/action.yml"
      - "/.github/actions/setup-moon/**/*"
      - "/.github/actions/setup-node-runtime/action.yml"
      - "/.github/actions/setup-node-pnpm/**/*"
      - "/.github/actions/setup-npm-publisher/**/*"
      - "/docs/maintainers/tooling.md"
      - "/src/sdks/kotlin/settings.gradle.kts"
      - "/src/sdks/kotlin/gradle/cache-scopes/**/*"
      - "/src/sources/toolchains/**/*"
      - "/src/runtimes/liboliphaunt/wasix/assets/build/docker/Dockerfile"
      - "/src/runtimes/liboliphaunt/wasix/assets/build/docker/isrg-root-x1.pem"
      - "/src/runtimes/liboliphaunt/wasix/assets/build/docker/install-pinned-apt-packages.sh"
      - "/src/runtimes/liboliphaunt/wasix/assets/build/docker/install-pinned-apt-packages.test.sh"
      - "/src/runtimes/liboliphaunt/wasix/assets/build/docker/install-pinned-wasixcc.sh"
      - "/src/runtimes/liboliphaunt/wasix/assets/build/docker/install-pinned-wasixcc.test.sh"
      - "/src/runtimes/liboliphaunt/wasix/assets/build/docker/pinned-wasixcc-assets.tsv"
      - "/src/runtimes/node-direct/tools/extract-node-headers.mjs"
      - "/src/runtimes/node-direct/tools/install-node-fallback.sh"
      - "/src/runtimes/node-direct/tools/install-node-fallback.test.sh"
      - "/tools/dev/bootstrap-tools.sh"
      - "/tools/dev/install-actionlint.sh"
      - "/tools/dev/install-pinned-maintainer-tool.sh"
      - "/tools/dev/setup-maestro.sh"
      - "/tools/dev/setup-maestro.test.sh"
      - "/tools/dev/extract-pinned-zip.sh"
      - "/tools/dev/extract-pinned-zip.test.sh"
      - "/tools/dev/curl-platform-flags.sh"
      - "/tools/dev/install-pinned-js-runtime.sh"
      - "/tools/dev/install-pinned-js-runtime.test.sh"
      - "/tools/dev/setup-android-sdk.sh"
      - "/tools/dev/setup-android-sdk.test.sh"
      - "/tools/dev/bun.sh"
      - "/tools/dev/deno.sh"
      - "/tools/dev/doctor.sh"
      - "/tools/coverage/coverage.mjs"
      - "/tools/policy/assertions/assert-source-inputs.mjs"
      - "/tools/release/maintainer-tool-install.test.mjs"
    options:
      cache: true
      runFromWorkspaceRoot: true
