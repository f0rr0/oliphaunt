$schema: "https://moonrepo.dev/schemas/project.json"

id: "third-party-shared"
language: "unknown"
layer: "configuration"
stack: "systems"
tags: ["third-party", "sources"]

project:
  title: "Shared Third-Party Sources"
  description: "Pinned third-party source metadata shared by native and WASIX runtimes."
  owner: "oliphaunt"

owners:
  defaultOwner: "@oliphaunt/core"
  paths:
    "**/*": ["@oliphaunt/core"]

tasks:
  check:
    tags: ["quality", "static"]
    command: "bun tools/policy/assertions/assert-source-inputs.mjs third-party-shared"
    inputs:
      - "/src/sources/third-party/shared/**/*"
      - "/tools/policy/assertions/assert-source-inputs.mjs"
      - "/tools/policy/fetch-sources.mjs"
      - "/tools/policy/source-fetch-core.mjs"
      - "/tools/policy/source-fetch-core.test.mjs"
      - "/tools/policy/source-archive.py"
      - "/tools/policy/verify-source-tree.py"
      - "/tools/xtask/src/source_spine.rs"
    options:
      cache: true
      runFromWorkspaceRoot: true
