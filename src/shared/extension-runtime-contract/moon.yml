$schema: "https://moonrepo.dev/schemas/project.json"

id: "extension-runtime-contract"
language: "python"
layer: "configuration"
stack: "systems"
tags: ["extensions", "contract", "runtime"]

project:
  title: "Extension Runtime Contract"
  description: "Shared contract between base runtimes and exact extension artifacts."
  owner: "oliphaunt"

owners:
  defaultOwner: "@oliphaunt/core"
  paths:
    "**/*": ["@oliphaunt/core"]

tasks:
  check:
    tags: ["quality", "static"]
    command: "python3 src/shared/extension-runtime-contract/tools/check-contract.py"
    inputs:
      - "/src/shared/extension-runtime-contract/**/*"
    options:
      cache: true
      runFromWorkspaceRoot: true
