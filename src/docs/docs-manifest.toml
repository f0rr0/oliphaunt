schema_version = 1
generated_root = "target/docs"
site_docs_root = "target/docs/site-docs"
static_root = "target/docs/static"

[api_reference]
generated_root = "target/docs/generated/api"
summary = "target/docs/generated/api/summary.json"
strict_env = "OLIPHAUNT_DOCS_REQUIRE_NATIVE_API"

[api_reference.c]
header = "src/runtimes/liboliphaunt/native/include/oliphaunt.h"
doxygen_config = "src/docs/reference/doxygen/Doxyfile"

[api_reference.rust]
package = "oliphaunt"
docs_entry = "target/docs/generated/api/rust/doc/oliphaunt/index.html"

[api_reference.swift]
package_path = "src/sdks/swift"
target = "Oliphaunt"
