included:
  - Sources
  - Tests
excluded:
  - .build
  - Vendor
  - DerivedData
analyzer_rules:
  - unused_import
opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - operator_usage_whitespace
  - redundant_nil_coalescing
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
disabled_rules:
  - file_length
  - function_body_length
  - type_body_length
line_length:
  warning: 110
  error: 140
identifier_name:
  min_length:
    warning: 2
type_name:
  min_length:
    warning: 3
