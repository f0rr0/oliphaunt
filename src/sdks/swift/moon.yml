$schema: "https://moonrepo.dev/schemas/project.json"

id: "oliphaunt-swift"
language: "swift"
layer: "library"
stack: "systems"
tags: ["sdk", "swift", "ios", "macos", "native", "release-product"]
dependsOn:
  - "liboliphaunt-native"
  - id: "shared-fixtures"
    scope: "build"

project:
  title: "Oliphaunt Swift SDK"
  description: "Swift SDK for iOS and macOS apps using native liboliphaunt."
  owner: "oliphaunt"
  release:
    component: "oliphaunt-swift"
    packagePath: "src/sdks/swift"

owners:
  defaultOwner: "@oliphaunt/sdk-swift"
  paths:
    "**/*.swift": ["@oliphaunt/sdk-swift"]
    "Package.swift": ["@oliphaunt/sdk-swift"]

tasks:
  check:
    tags: ["quality", "static"]
    command: "bash src/sdks/swift/tools/check-sdk.sh check-static"
    deps:
      - "liboliphaunt-native:check"
      - "shared-contracts:check"
    inputs:
      - "/Package.swift"
      - "/src/shared/fixtures/**/*"
      - "/src/sdks/swift/**/*"
      - "!/src/sdks/swift/.build"
      - "!/src/sdks/swift/.build/**"
      - "/tools/runtime/**/*"
    options:
      cache: true
      runFromWorkspaceRoot: true
  test:
    tags: ["quality", "unit"]
    command: "bash src/sdks/swift/tools/check-sdk.sh test-unit"
    deps:
      - "liboliphaunt-native:check"
      - "shared-fixtures:check"
    inputs:
      - "/Package.swift"
      - "/src/shared/fixtures/**/*"
      - "/src/sdks/swift/**/*"
      - "!/src/sdks/swift/.build"
      - "!/src/sdks/swift/.build/**"
      - "/tools/runtime/**/*"
    options:
      cache: true
      runFromWorkspaceRoot: true
  smoke:
    tags: ["runtime", "smoke"]
    command: "bash src/sdks/swift/tools/check-sdk.sh smoke-runtime"
    deps:
      - "liboliphaunt-native:host-smoke"
    inputs:
      - "/Package.swift"
      - "/src/extensions/**/*"
      - "/src/runtimes/liboliphaunt/native/**/*"
      - "/src/sdks/swift/**/*"
      - "!/src/sdks/swift/.build"
      - "!/src/sdks/swift/.build/**"
      - "/tools/runtime/**/*"
      - "/tools/xtask/**/*"
      - "/Cargo.lock"
      - "/Cargo.toml"
      - "/rust-toolchain.toml"
    options:
      cache: local
      runFromWorkspaceRoot: true
  package:
    tags: ["package"]
    command: "bash src/sdks/swift/tools/check-sdk.sh package-shape"
    deps:
      - "liboliphaunt-native:check"
    inputs:
      - "/Package.swift"
      - "/src/shared/fixtures/**/*"
      - "/src/sdks/swift/**/*"
      - "!/src/sdks/swift/.build"
      - "!/src/sdks/swift/.build/**"
      - "/src/runtimes/liboliphaunt/native/bin/build-ios-xcframework.sh"
      - "/tools/runtime/**/*"
    options:
      cache: local
      runFromWorkspaceRoot: true
  package-artifacts:
    tags: ["release", "artifact-package", "ci-swift-sdk-package"]
    command: "bash tools/release/build-sdk-ci-artifacts.sh oliphaunt-swift"
    deps:
      - "liboliphaunt-native:check"
    inputs:
      - "/Package.swift"
      - "/src/shared/fixtures/**/*"
      - "/src/sdks/swift/**/*"
      - "!/src/sdks/swift/.build"
      - "!/src/sdks/swift/.build/**"
      - "/src/runtimes/liboliphaunt/native/bin/build-ios-xcframework.sh"
      - "/tools/release/build-sdk-ci-artifacts.sh"
      - "/tools/runtime/**/*"
    outputs:
      - "/target/sdk-artifacts/oliphaunt-swift/**/*"
    options:
      cache: local
      runFromWorkspaceRoot: true
  release-check:
    tags: ["release", "package"]
    command: "bash src/sdks/swift/tools/check-sdk.sh release-check"
    deps:
      - "liboliphaunt-native:check"
      - "liboliphaunt-native:release-runtime"
    inputs:
      - "/Package.swift"
      - "/src/shared/fixtures/**/*"
      - "/src/sdks/swift/**/*"
      - "!/src/sdks/swift/.build"
      - "!/src/sdks/swift/.build/**"
      - "/src/runtimes/liboliphaunt/native/bin/build-ios-xcframework.sh"
      - "/tools/runtime/**/*"
    options:
      cache: local
      runFromWorkspaceRoot: true
  bench:
    tags: ["bench", "plan"]
    command: "bash tools/perf/matrix/run_mobile_footprint_matrix.sh --plan-only --quick --platform ios"
    inputs:
      - "/src/shared/fixtures/**/*"
      - "/src/sdks/swift/**/*"
      - "!/src/sdks/swift/.build"
      - "!/src/sdks/swift/.build/**"
      - "/tools/perf/**/*"
      - "/benchmarks/**/*"
      - "/release-please-config.json"
      - "/.release-please-manifest.json"
      - "/src/**/release.toml"
      - "/src/**/targets/**/*.toml"
    options:
      cache: true
      runFromWorkspaceRoot: true
      runInCI: false
  regression:
    tags: ["regression", "runtime"]
    command: "bash src/sdks/swift/tools/check-sdk.sh regression"
    deps:
      - "liboliphaunt-native:check"
    inputs:
      - "/Package.swift"
      - "/src/shared/fixtures/**/*"
      - "/src/sdks/swift/**/*"
      - "!/src/sdks/swift/.build"
      - "!/src/sdks/swift/.build/**"
      - "/tools/runtime/**/*"
    options:
      cache: local
      runFromWorkspaceRoot: true
      runInCI: false
  coverage:
    tags: ["coverage", "quality"]
    command: "tools/coverage/run-product oliphaunt-swift"
    inputs:
      - "/Package.swift"
      - "/coverage/baseline.toml"
      - "/src/shared/fixtures/**/*"
      - "/src/sdks/swift/**/*"
      - "!/src/sdks/swift/.build"
      - "!/src/sdks/swift/.build/**"
      - "/tools/coverage/**/*"
    outputs:
      - "/target/coverage/oliphaunt-swift/**/*"
    options:
      cache: true
      runFromWorkspaceRoot: true
  bench-run:
    tags: ["bench", "measured"]
    command: "bash tools/perf/matrix/run_mobile_footprint_matrix.sh --platform ios"
    inputs:
      - "/src/shared/fixtures/**/*"
      - "/src/sdks/swift/**/*"
      - "!/src/sdks/swift/.build"
      - "!/src/sdks/swift/.build/**"
      - "/tools/perf/**/*"
      - "/benchmarks/**/*"
      - "/release-please-config.json"
      - "/.release-please-manifest.json"
      - "/src/**/release.toml"
      - "/src/**/targets/**/*.toml"
    options:
      cache: false
      runFromWorkspaceRoot: true
      runInCI: false
