def findNodeModulePackageJson(String packageName) {
  def current = projectDir
  while (current != null) {
    def candidate = new File(current, "node_modules/${packageName}/package.json")
    if (candidate.exists()) {
      return candidate
    }
    current = current.parentFile
  }
  return null
}

def findNodeModuleDir(String packageName) {
  def packageJson = findNodeModulePackageJson(packageName)
  return packageJson == null ? null : packageJson.parentFile
}

def resolveReactNativeVersion() {
  if (project.hasProperty("reactNativeVersion")) {
    return project.property("reactNativeVersion").toString()
  }
  if (rootProject.ext.has("reactNativeVersion")) {
    return rootProject.ext.reactNativeVersion.toString()
  }
  def packageJson = findNodeModulePackageJson("react-native")
  if (packageJson != null) {
    return new JsonSlurper().parse(packageJson).version.toString()
  }
  throw new GradleException(
    "Could not resolve React Native version. Install react-native in node_modules " +
    "or pass -PreactNativeVersion=<version> when building @oliphaunt/react-native."
  )
}

