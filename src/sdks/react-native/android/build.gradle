)?.toString()

def parseAndroidAbiFilters = { String raw ->
  if (raw == null || raw.isBlank() || raw.trim().equalsIgnoreCase("all")) {
    return []
  }
  def supported = ["arm64-v8a", "armeabi-v7a", "x86", "x86_64"] as Set
  def values = raw.split(",")
    .collect { it.trim() }
    .findAll { !it.isEmpty() }
    .unique(false)
  values.each { value ->
    if (!supported.contains(value)) {
      throw new GradleException(
        "Oliphaunt Android ABI filter '${value}' is not supported; expected one of ${supported.join(", ")}"
      )
    }
  }
  return values
}

def androidAbiFilters = parseAndroidAbiFilters(explicitAndroidAbiFiltersRaw)

abstract class PrepareOliphauntAndroidAssetsTask extends DefaultTask {
  @Input
  abstract Property<String> getRuntimeResourcesDirPath()

  @Input
  abstract Property<String> getRuntimeDirPath()

  @Input
  abstract Property<String> getTemplatePgdataDirPath()

  @Input
  abstract ListProperty<String> getSelectedExtensions()

  @Input
  abstract ListProperty<String> getMobileStaticModuleStems()

  @InputFiles
  @PathSensitive(PathSensitivity.RELATIVE)
  abstract ConfigurableFileCollection getSourceDirectories()

  @InputFiles
  @PathSensitive(PathSensitivity.RELATIVE)
  abstract ConfigurableFileCollection getGeneratedExtensionMetadata()

  @OutputDirectory
  abstract DirectoryProperty getOutputDir()

  private Map<String, Map<String, Object>> generatedExtensionMetadataBySqlName

  private Map<String, Map<String, Object>> generatedExtensionMetadataBySqlName() {
    if (generatedExtensionMetadataBySqlName == null) {
      generatedExtensionMetadataBySqlName = loadGeneratedExtensionMetadata(generatedExtensionMetadata.singleFile)
    }
    return generatedExtensionMetadataBySqlName
  }

  @TaskAction
  void prepare() {
    File output = outputDir.get().asFile
    deleteTree(output.toPath())
    output.mkdirs()

    String runtimeResourcesPath = runtimeResourcesDirPath.get()
    if (runtimeResourcesPath != null && !runtimeResourcesPath.isBlank()) {
      File sourceRuntimeResourcesRoot = runtimeResourcesRoot(new File(runtimeResourcesPath))
      if (!sourceRuntimeResourcesRoot.isDirectory()) {
        throw new GradleException("Oliphaunt React Native Android runtime resources are not a Oliphaunt resource root: ${runtimeResourcesPath}")
      }
      validateRuntimeResourcesSchema(sourceRuntimeResourcesRoot)
      copyTree(sourceRuntimeResourcesRoot.toPath(), new File(output, "oliphaunt").toPath(), ["static-registry/archives"] as Set<String>)
      validateSelectedExtensionFiles(
        sourceRuntimeResourcesRoot,
        new File(output, "oliphaunt/runtime/files"),
        selectedExtensions.get(),
        mobileStaticModuleStems.get(),
        generatedExtensionMetadataBySqlName()
      )
      return
    }

    writeAssetPackage(
      "runtime",
      "postgres-runtime-files-v1",
      blankToNull(runtimeDirPath.get()),
      selectedExtensions.get(),
      mobileStaticModuleStems.get(),
      output
    )
    writeAssetPackage(
      "template-pgdata",
      "postgres-template-pgdata-v1",
      blankToNull(templatePgdataDirPath.get()),
      [],
      [],
      output
    )
  }

  private static File runtimeResourcesRoot(File root) {
    File nested = new File(root, "oliphaunt")
    if (nested.isDirectory()) {
      return nested
    }
    if (new File(root, "runtime").isDirectory()) {
      return root
    }
    return nested
  }

  private static void validateRuntimeResourcesSchema(File root) {
    ["runtime", "template-pgdata"].each { name ->
      File manifest = new File(new File(root, name), "manifest.properties")
      if (!manifest.isFile()) {
        throw new GradleException("Oliphaunt React Native Android runtime resources are missing ${name}/manifest.properties under ${root.absolutePath}")
      }
      def properties = new Properties()
      manifest.withInputStream { properties.load(it) }
      String schema = properties.getProperty("schema")?.trim() ?: ""
      if (schema != "oliphaunt-runtime-resources-v1") {
        throw new GradleException("Oliphaunt React Native Android runtime resources ${name} manifest has unsupported schema '${schema.isEmpty() ? "<missing>" : schema}'; expected oliphaunt-runtime-resources-v1")
      }
    }
  }

  private static String blankToNull(String value) {
    return value == null || value.isBlank() ? null : value
  }

  private void writeAssetPackage(
    String name,
    String layout,
    String sourcePath,
    List<String> requestedExtensions,
    List<String> mobileStaticModuleStems,
    File output
  ) {
    if (sourcePath == null || sourcePath.isBlank()) {
      if (!requestedExtensions.isEmpty()) {
        throw new GradleException("Oliphaunt Android extensions require -PoliphauntRuntimeDir=<postgres-install-root>")
      }
      return
    }
    File source = new File(sourcePath)
    if (!source.isDirectory()) {
      throw new GradleException("Oliphaunt Android ${name} assets source is not a directory: ${source}")
    }
    if (!mobileStaticModuleStems.isEmpty()) {
      throw new GradleException(
        "Oliphaunt React Native Android split runtime packaging cannot declare mobile static module stems. " +
          "Use -PoliphauntRuntimeResourcesDir=<runtime-resource output> from " +
          "`oliphaunt-resources --mobile-static-module ...` so the runtime resources include the generated static-registry source."
      )
    }
    File packageDir = new File(output, "oliphaunt/${name}")
    File filesDir = new File(packageDir, "files")
    copyTree(source.toPath(), filesDir.toPath())
    Map<String, Map<String, Object>> metadataBySqlName = generatedExtensionMetadataBySqlName()
    List<String> extensions = resolveExtensionSelection(requestedExtensions, metadataBySqlName)
    validateSelectedExtensionFiles(null, filesDir, extensions, mobileStaticModuleStems, metadataBySqlName)
    List<String> createableExtensions = extensions.findAll { extension ->
      Map<String, Object> metadata = generatedExtensionMetadataRow(extension, metadataBySqlName)
      if (!(metadata["creates-extension"] instanceof Boolean)) {
        throw new GradleException(
          "Oliphaunt React Native Android extension '${extension}' must declare canonical creates-extension metadata"
        )
      }
      return metadata["creates-extension"] == true
    }
    List<String> nativeModuleStems = nativeModuleStems(extensions, metadataBySqlName)
    Set<String> registeredModuleStems = new TreeSet<>(mobileStaticModuleStems)
    Set<String> selectedModuleStems = new TreeSet<>(nativeModuleStems)
    Set<String> unknownRegisteredStems = new TreeSet<>(registeredModuleStems)
    unknownRegisteredStems.removeAll(selectedModuleStems)
    if (!unknownRegisteredStems.isEmpty()) {
      throw new GradleException(
        "Oliphaunt React Native Android mobile static module stem(s) were not selected by these runtime resources: ${unknownRegisteredStems.join(",")}"
      )
    }
    List<String> registeredMobileExtensions = mobileStaticRegistryRegisteredExtensions(
      extensions,
      registeredModuleStems,
      metadataBySqlName
    )
    List<String> pendingMobileExtensions = mobileStaticRegistryPendingExtensions(
      extensions,
      registeredModuleStems,
      metadataBySqlName
    )
    String mobileStaticRegistryState = nativeModuleStems.isEmpty()
      ? "not-required"
      : (pendingMobileExtensions.isEmpty() ? "complete" : "pending")
    File manifest = new File(packageDir, "manifest.properties")
    manifest.parentFile.mkdirs()
    manifest.text = [
      "schema=oliphaunt-runtime-resources-v1",
      "cacheKey=${sha256Directory(source)}",
      "layout=${layout}",
      "source=${source.name}",
      "selectedExtensions=${extensions.join(",")}",
      "extensions=${createableExtensions.join(",")}",
      "runtimeFeatures=",
      "sharedPreloadLibraries=${sharedPreloadLibraries(extensions, metadataBySqlName).join(",")}",
      "mobileStaticRegistryState=${mobileStaticRegistryState}",
      "mobileStaticRegistryRegistered=${registeredMobileExtensions.join(",")}",
      "mobileStaticRegistryPending=${pendingMobileExtensions.join(",")}",
      "nativeModuleStems=${nativeModuleStems.join(",")}",
      "mobileStaticRegistrySource=",
      "",
    ].join("\n")
  }

  private static void validateSelectedExtensionFiles(
    File runtimeResourcesRoot,
    File filesDir,
    List<String> extensions,
    List<String> effectiveMobileStaticModuleStems,
    Map<String, Map<String, Object>> metadataBySqlName
  ) {
    if (extensions.isEmpty()) {
      return
    }
    File extensionDir = new File(filesDir, "share/postgresql/extension")
    extensions.each { extension ->
      Map<String, Object> metadata = generatedExtensionMetadataRow(extension, metadataBySqlName)
      if (!(metadata["creates-extension"] instanceof Boolean)) {
        throw new GradleException(
          "Oliphaunt React Native Android extension '${extension}' must declare canonical creates-extension metadata"
        )
      }
      if (metadata["creates-extension"] == false) {
        String moduleStem = generatedNativeModuleStem(extension, metadataBySqlName)
        if (moduleStem == null || moduleStem.isBlank()) {
          throw new GradleException(
            "Oliphaunt React Native Android non-CREATE extension '${extension}' must declare a native module stem"
          )
        }
        File module = new File(filesDir, "lib/postgresql/${moduleStem}.so")
        if (!module.isFile()) {
          String staticRegistrationError = incompleteMobileStaticRegistration(
            runtimeResourcesRoot,
            extension,
            moduleStem,
            effectiveMobileStaticModuleStems
          )
          if (staticRegistrationError == null) {
            return
          }
          throw new GradleException(
            "Oliphaunt React Native Android selected non-CREATE extension '${extension}' is missing native module ${module} " +
              "and a complete mobile static registration: ${staticRegistrationError}"
          )
        }
        return
      }
      File control = new File(extensionDir, "${extension}.control")
      if (!control.isFile()) {
        throw new GradleException(
          "Oliphaunt React Native Android selected extension '${extension}' is missing control file ${control}"
        )
      }
      File[] sqlFiles = extensionDir.listFiles({ File file ->
        file.isFile() && file.name.startsWith("${extension}--") && file.name.endsWith(".sql")
      } as FileFilter) ?: [] as File[]
      if (sqlFiles.length == 0) {
        throw new GradleException(
          "Oliphaunt React Native Android selected extension '${extension}' has no packaged SQL files in ${extensionDir}"
        )
      }
    }
  }

  private static String incompleteMobileStaticRegistration(
    File runtimeResourcesRoot,
    String extension,
    String moduleStem,
    List<String> effectiveMobileStaticModuleStems
  ) {
    if (runtimeResourcesRoot == null) {
      return "split runtime inputs do not provide a static-registry contract"
    }
    if (!effectiveMobileStaticModuleStems.contains(moduleStem)) {
      return "effective mobile static module stems do not include '${moduleStem}'"
    }
    File runtimeManifestFile = new File(runtimeResourcesRoot, "runtime/manifest.properties")
    File staticRegistryDir = new File(runtimeResourcesRoot, "static-registry")
    File staticManifestFile = new File(staticRegistryDir, "manifest.properties")
    if (!runtimeManifestFile.isFile()) {
      return "runtime/manifest.properties is missing"
    }
    if (!staticManifestFile.isFile()) {
      return "static-registry/manifest.properties is missing"
    }

    Properties runtimeManifest = readProperties(runtimeManifestFile)
    Properties staticManifest = readProperties(staticManifestFile)
    if (runtimeManifest.getProperty("mobileStaticRegistryState", "") != "complete") {
      return "runtime manifest mobileStaticRegistryState is not complete"
    }
    if (!manifestCsv(runtimeManifest, "mobileStaticRegistryRegistered").contains(extension)) {
      return "runtime manifest does not register extension '${extension}'"
    }
    if (manifestCsv(runtimeManifest, "mobileStaticRegistryPending").contains(extension)) {
      return "runtime manifest still marks extension '${extension}' as pending"
    }
    if (!manifestCsv(runtimeManifest, "nativeModuleStems").contains(moduleStem)) {
      return "runtime manifest does not declare native module stem '${moduleStem}'"
    }
    if (staticManifest.getProperty("packageLayout", "") != "oliphaunt-static-registry-v1") {
      return "static registry has an unsupported packageLayout"
    }
    if (staticManifest.getProperty("abiVersion", "") != "1") {
      return "static registry has an unsupported abiVersion"
    }
    if (staticManifest.getProperty("state", "") != "complete") {
      return "static registry state is not complete"
    }
    if (!manifestCsv(staticManifest, "registeredExtensions").contains(extension)) {
      return "static registry does not register extension '${extension}'"
    }
    if (manifestCsv(staticManifest, "pendingExtensions").contains(extension)) {
      return "static registry still marks extension '${extension}' as pending"
    }
    if (!manifestCsv(staticManifest, "nativeModuleStems").contains(moduleStem)) {
      return "static registry does not declare native module stem '${moduleStem}'"
    }
    if (!manifestCsv(staticManifest, "modules").contains(moduleStem)) {
      return "static registry does not include native module '${moduleStem}'"
    }
    String registeredExtension = staticManifest.getProperty("module.${moduleStem}.extension", "")
    if (registeredExtension != extension) {
      return "static registry maps native module '${moduleStem}' to '${registeredExtension ?: "<missing>"}', expected '${extension}'"
    }
    Set<String> archiveTargets = manifestCsv(staticManifest, "module.${moduleStem}.archiveTargets")
    if (archiveTargets.isEmpty()) {
      return "static registry does not declare archive targets for native module '${moduleStem}'"
    }
    for (String target : archiveTargets) {
      if (staticManifest.getProperty("module.${moduleStem}.archive.${target}", "").isBlank()) {
        return "static registry does not declare the '${target}' archive for native module '${moduleStem}'"
      }
    }

    String runtimeSource = runtimeManifest.getProperty("mobileStaticRegistrySource", "")
    String registrySource = staticManifest.getProperty("source", "")
    if (runtimeSource.isBlank() || registrySource.isBlank()) {
      return "static registry source metadata is missing"
    }
    Path root = runtimeResourcesRoot.toPath().toAbsolutePath().normalize()
    Path runtimeSourcePath = root.resolve(runtimeSource).normalize()
    Path registrySourcePath = staticRegistryDir.toPath().toAbsolutePath().normalize().resolve(registrySource).normalize()
    if (!runtimeSourcePath.startsWith(root) || !registrySourcePath.startsWith(staticRegistryDir.toPath().toAbsolutePath().normalize())) {
      return "static registry source metadata escapes the runtime resources root"
    }
    if (runtimeSourcePath != registrySourcePath) {
      return "runtime and static-registry manifests disagree on the registry source"
    }
    if (!Files.isRegularFile(runtimeSourcePath)) {
      return "declared static registry source is missing: ${runtimeSourcePath}"
    }
    return null
  }

  private static Properties readProperties(File file) {
    Properties properties = new Properties()
    file.withInputStream { properties.load(it) }
    return properties
  }

  private static Set<String> manifestCsv(Properties properties, String key) {
    List<String> values = properties.getProperty(key, "")
      .split(",")
      .collect { it.trim() }
      .findAll { !it.isEmpty() }
    return new TreeSet<String>(values)
  }

  private static Map<String, Map<String, Object>> loadGeneratedExtensionMetadata(File metadataFile) {
    def parsed = new JsonSlurper().parse(metadataFile)
    if (!(parsed instanceof Map) || !(parsed.extensions instanceof List)) {
      throw new GradleException("generated extension metadata must define extensions: ${metadataFile}")
    }
    Map<String, Map<String, Object>> rows = [:]
    parsed.extensions.each { row ->
      if (!(row instanceof Map) || !(row["sql-name"] instanceof String)) {
        throw new GradleException("generated extension metadata rows must define sql-name: ${metadataFile}")
      }
      rows[row["sql-name"].toString()] = row as Map<String, Object>
    }
    return rows
  }

  private static List<String> generatedExtensionStringList(
    String extension,
    String field,
    Map<String, Map<String, Object>> metadataBySqlName
  ) {
    def values = generatedExtensionMetadataRow(extension, metadataBySqlName).get(field)
    if (!(values instanceof List)) {
      return []
    }
    return values.collect { it.toString() }
  }

  private static Map<String, Object> generatedExtensionMetadataRow(
    String extension,
    Map<String, Map<String, Object>> metadataBySqlName
  ) {
    def row = metadataBySqlName[extension]
    if (row == null) {
      throw new GradleException(
        "Oliphaunt React Native Android split runtime packaging cannot select unknown extension '${extension}'. " +
          "Use a generated built-in extension name, or pass " +
          "-PoliphauntRuntimeResourcesDir=<runtime-resource output> for custom prebuilt extension artifacts."
      )
    }
    return row
  }

  private static String generatedNativeModuleStem(
    String extension,
    Map<String, Map<String, Object>> metadataBySqlName
  ) {
    def row = generatedExtensionMetadataRow(extension, metadataBySqlName)
    def stem = row["native-module-stem"]
    return stem == null ? null : stem.toString()
  }

  private static List<String> resolveExtensionSelection(
    List<String> requestedExtensions,
    Map<String, Map<String, Object>> metadataBySqlName
  ) {
    Set<String> extensions = new LinkedHashSet<>()
    requestedExtensions.each { extension ->
      extensions.addAll(extensionDependencies(extension, metadataBySqlName))
      extensions.add(extension)
    }
    List<String> resolved = extensions.toList().sort()
    resolved.each { extension ->
      requireMobileReleaseReady(extension, metadataBySqlName)
    }
    return resolved
  }

  private static List<String> extensionDependencies(
    String extension,
    Map<String, Map<String, Object>> metadataBySqlName
  ) {
    return generatedExtensionStringList(extension, "selected-extension-dependencies", metadataBySqlName)
  }

  private static void requireMobileReleaseReady(
    String extension,
    Map<String, Map<String, Object>> metadataBySqlName
  ) {
    def row = generatedExtensionMetadataRow(extension, metadataBySqlName)
    if (row["mobile-release-ready"] != true) {
      throw new GradleException(
        "Oliphaunt React Native Android split runtime packaging cannot select extension '${extension}' because " +
          "it does not have release-ready Android/iOS artifacts in the generated exact-extension catalog."
      )
    }
  }

  private static List<String> sharedPreloadLibraries(
    List<String> extensions,
    Map<String, Map<String, Object>> metadataBySqlName
  ) {
    extensions
      .collectMany { generatedExtensionStringList(it, "shared-preload-libraries", metadataBySqlName) }
      .toSet()
      .sort()
  }

  private static List<String> mobileStaticRegistryRegisteredExtensions(
    List<String> extensions,
    Set<String> registeredModuleStems,
    Map<String, Map<String, Object>> metadataBySqlName
  ) {
    extensions
      .findAll { registeredModuleStems.contains(nativeModuleStem(it, metadataBySqlName)) }
      .toSet()
      .sort()
  }

  private static List<String> mobileStaticRegistryPendingExtensions(
    List<String> extensions,
    Set<String> registeredModuleStems,
    Map<String, Map<String, Object>> metadataBySqlName
  ) {
    extensions
      .findAll {
        def stem = nativeModuleStem(it, metadataBySqlName)
        stem != null && !registeredModuleStems.contains(stem)
      }
      .toSet()
      .sort()
  }

  private static List<String> nativeModuleStems(
    List<String> extensions,
    Map<String, Map<String, Object>> metadataBySqlName
  ) {
    extensions
      .collect { nativeModuleStem(it, metadataBySqlName) }
      .findAll { it != null }
      .toSet()
      .sort()
  }

  private static String nativeModuleStem(String extension, Map<String, Map<String, Object>> metadataBySqlName) {
    return generatedNativeModuleStem(extension, metadataBySqlName)
  }

  private static String sha256Directory(File source) {
    MessageDigest digest = MessageDigest.getInstance("SHA-256")
    Path rootPath = source.toPath()
    Files.walk(rootPath).withCloseable { stream ->
      stream.sorted().forEach { path ->
        if (Files.isSymbolicLink(path)) {
          throw new GradleException("Oliphaunt Android assets do not support symlinks: ${path}")
        }
        if (Files.isRegularFile(path)) {
          String relative = rootPath.relativize(path).toString().replace(File.separatorChar, '/' as char)
          digest.update(relative.getBytes("UTF-8"))
          digest.update((byte) 0)
          digest.update(Files.readAllBytes(path))
          digest.update((byte) 0)
        }
      }
    }
    return digest.digest().encodeHex().toString()
  }

  private static void copyTree(Path source, Path target) {
    copyTree(source, target, [] as Set<String>)
  }

  private static void copyTree(Path source, Path target, Set<String> excludedPrefixes) {
    Files.walk(source).withCloseable { stream ->
      stream.sorted().forEach { path ->
        if (Files.isSymbolicLink(path)) {
          throw new GradleException("Oliphaunt Android assets do not support symlinks: ${path}")
        }
        Path relative = source.relativize(path)
        String relativeName = relative.toString().replace(File.separatorChar, '/' as char)
        if (!excludedPrefixes.any { prefix -> relativeName == prefix || relativeName.startsWith("${prefix}/") }) {
          Path destination = target.resolve(relative)
          if (Files.isDirectory(path)) {
            Files.createDirectories(destination)
          } else if (Files.isRegularFile(path)) {
            Files.createDirectories(destination.parent)
            Files.copy(path, destination, StandardCopyOption.REPLACE_EXISTING)
          }
        }
      }
    }
  }

  private static void deleteTree(Path path) {
    if (!Files.exists(path)) {
      return
    }
    Files.walk(path).withCloseable { stream ->
      stream.sorted(Comparator.reverseOrder()).forEach { Files.deleteIfExists(it) }
    }
  }

}

abstract class PrepareOliphauntAndroidJniLibsTask extends DefaultTask {
  private static final Set<String> ANDROID_JNI_LIB_ABIS = ["arm64-v8a", "armeabi-v7a", "x86", "x86_64"] as Set

  @Input
  abstract Property<String> getJniLibsDirPath()

  @InputFiles
  @PathSensitive(PathSensitivity.RELATIVE)
  abstract ConfigurableFileCollection getSourceDirectories()

  @OutputDirectory
  abstract DirectoryProperty getOutputDir()

  @TaskAction
  void prepare() {
    File output = outputDir.get().asFile
    deleteTree(output.toPath())
    String configured = jniLibsDirPath.get()
    if (configured == null || configured.isBlank()) {
      return
    }
    File configuredRoot = new File(configured)
    File nested = new File(configuredRoot, "jniLibs")
    File source = nested.isDirectory() ? nested : configuredRoot
    if (!source.isDirectory()) {
      throw new GradleException("Oliphaunt React Native Android JNI libs source is not a directory: ${source}")
    }

    List<File> abiDirs = (source.listFiles()?.findAll { it.isDirectory() } ?: [])
      .sort { a, b -> a.name <=> b.name }
    if (abiDirs.isEmpty()) {
      throw new GradleException("Oliphaunt React Native Android JNI libs require ABI directories under ${source}")
    }

    boolean packagedLiboliphaunt = false
    abiDirs.each { abiDir ->
      if (!ANDROID_JNI_LIB_ABIS.contains(abiDir.name)) {
        throw new GradleException("unsupported Android ABI directory for Oliphaunt React Native package: ${abiDir.name}")
      }
      if (Files.isSymbolicLink(abiDir.toPath())) {
        throw new GradleException("Oliphaunt React Native Android JNI libs do not support symlink ABI directories: ${abiDir}")
      }
      List<File> sharedLibraries = (abiDir.listFiles()?.findAll { file ->
        if (Files.isSymbolicLink(file.toPath())) {
          throw new GradleException("Oliphaunt React Native Android JNI libs do not support symlinks: ${file}")
        }
        if (!file.isFile()) {
          throw new GradleException("Oliphaunt React Native Android JNI libs only support flat .so files under ABI directories: ${file}")
        }
        file.name.endsWith(".so")
      } ?: []).sort { a, b -> a.name <=> b.name }
      if (!sharedLibraries.any { it.name == "liboliphaunt.so" }) {
        throw new GradleException("Android ABI ${abiDir.name} is missing liboliphaunt.so")
      }
      packagedLiboliphaunt = true
      File destination = new File(output, abiDir.name)
      destination.mkdirs()
      sharedLibraries.each { library ->
        Files.copy(library.toPath(), new File(destination, library.name).toPath(), StandardCopyOption.REPLACE_EXISTING)
      }
    }
    if (!packagedLiboliphaunt) {
      throw new GradleException("Oliphaunt React Native Android JNI libs did not contain liboliphaunt.so for any ABI")
    }
  }

  private static void deleteTree(Path path) {
    if (!Files.exists(path)) {
      return
    }
    Files.walk(path).withCloseable { stream ->
      stream.sorted(Comparator.reverseOrder()).forEach { Files.deleteIfExists(it) }
    }
  }
}

tasks.register("generateOliphauntCodegenSchema", Exec) {
  inputs.file(codegenSpec)
  inputs.file(packageJson)
  outputs.file(generatedCodegenSchema)
  workingDir projectDir.parentFile
  commandLine(
    nodeExecutable,
    new File(reactNativeCodegenDir, "lib/cli/combine/combine-js-to-schema-cli.js").absolutePath,
    generatedCodegenSchema.absolutePath,
    codegenSpec.absolutePath
  )
}

tasks.register("generateOliphauntCodegenArtifacts", Exec) {
  dependsOn("generateOliphauntCodegenSchema")
  inputs.file(generatedCodegenSchema)
  inputs.file(packageJson)
  outputs.dir(file("${generatedCodegenDir}/java"))
  outputs.dir(file("${generatedCodegenDir}/jni"))
  workingDir projectDir.parentFile
  commandLine(
    nodeExecutable,
    new File(reactNativeDir, "scripts/generate-specs-cli.js").absolutePath,
    "--platform",
    "android",
    "--schemaPath",
    generatedCodegenSchema.absolutePath,
    "--outputDir",
    generatedCodegenDir.absolutePath,
    "--libraryName",
    "OliphauntReactNativeSpec",
    "--javaPackageName",
    "dev.oliphaunt.reactnative"
  )
}

tasks.register("prepareOliphauntAndroidAssets", PrepareOliphauntAndroidAssetsTask) {
  runtimeResourcesDirPath.set(packagedRuntimeResourcesDir ?: "")
  runtimeDirPath.set(packagedRuntimeDir ?: "")
  templatePgdataDirPath.set(packagedTemplatePgdataDir ?: "")
  selectedExtensions.set(packagedExtensions)
  mobileStaticModuleStems.set(packagedMobileStaticModules)
  generatedExtensionMetadata.from(file("../src/generated/extensions.json"))
  [packagedRuntimeResourcesDir, packagedRuntimeDir, packagedTemplatePgdataDir]
    .findAll { it != null && !it.isBlank() }
    .each { sourceDirectories.from(file(it)) }
  outputDir.set(generatedOliphauntAssetsDir)
}

tasks.register("prepareOliphauntAndroidJniLibs", PrepareOliphauntAndroidJniLibsTask) {
  jniLibsDirPath.set(packagedAndroidJniLibsDir ?: "")
  if (packagedAndroidJniLibsDir != null && !packagedAndroidJniLibsDir.isBlank()) {
    sourceDirectories.from(file(packagedAndroidJniLibsDir))
  }
  outputDir.set(generatedOliphauntJniLibsDir)
}

android {
  namespace = "dev.oliphaunt.reactnative"
  compileSdk = 36

  sourceSets {
    main {
      java.srcDirs += file("${generatedCodegenDir}/java")
      if (packagesAndroidRuntimeInReactNative) {
        assets.srcDirs += generatedOliphauntAssetsDir
        jniLibs.srcDirs += generatedOliphauntJniLibsDir
      }
    }
  }

  defaultConfig {
    minSdk = 24
    if (!androidAbiFilters.isEmpty()) {
      ndk {
        abiFilters.addAll(androidAbiFilters)
      }
    }
    externalNativeBuild {
      cmake {
        arguments "-DANDROID_STL=c++_shared"
        if (packagesAndroidRuntimeInReactNative && !packagedMobileStaticModules.isEmpty()) {
          arguments "-DOLIPHAUNT_MOBILE_STATIC_MODULES=${packagedMobileStaticModules.join(";")}"
          if (packagedStaticRegistrySource != null) {
            arguments "-DOLIPHAUNT_STATIC_REGISTRY_SOURCE=${packagedStaticRegistrySource}"
          }
          if (effectiveAndroidExtensionArchivesDir != null && !effectiveAndroidExtensionArchivesDir.isBlank()) {
            arguments "-DOLIPHAUNT_EXTENSION_ARCHIVES_ROOT=${file(effectiveAndroidExtensionArchivesDir).absolutePath}"
          }
          if (packagedAndroidJniLibsDir != null && !packagedAndroidJniLibsDir.isBlank()) {
            arguments "-DOLIPHAUNT_ANDROID_JNI_LIBS_ROOT=${file(packagedAndroidJniLibsDir).absolutePath}"
          }
          if (packagedAndroidLinkEvidenceFile != null && !packagedAndroidLinkEvidenceFile.isBlank()) {
            arguments "-DOLIPHAUNT_ANDROID_LINK_EVIDENCE_FILE=${file(packagedAndroidLinkEvidenceFile).absolutePath}"
          }
        }
      }
    }
  }

  buildFeatures {
    prefab = true
  }

  compileOptions {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
  }

  testOptions {
    unitTests {
      includeAndroidResources = true
    }
  }

  externalNativeBuild {
    cmake {
      path = file("src/main/cpp/CMakeLists.txt")
      buildStagingDirectory = cxxBuildRoot
      version = "3.22.1"
    }
  }

}

kotlin {
  compilerOptions {
    jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
  }
}

repositories {
  if (kotlinSdkMavenRepository != null && !kotlinSdkMavenRepository.isBlank()) {
    maven {
      url = uri(kotlinSdkMavenRepository)
    }
  }
  google()
  mavenCentral()
}

dependencies {
  implementation "com.facebook.react:react-android:${reactNativeVersion}"
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.10.2"
  if (localKotlinSdkProject != null) {
    implementation localKotlinSdkProject
  } else {
    implementation kotlinSdkDependency
  }
  testImplementation "junit:junit:4.13.2"
  testImplementation "org.robolectric:robolectric:4.16.1"
}

tasks.named("preBuild") {
  dependsOn("generateOliphauntCodegenArtifacts")
  if (packagesAndroidRuntimeInReactNative) {
    dependsOn("prepareOliphauntAndroidAssets")
    dependsOn("prepareOliphauntAndroidJniLibs")
  }
}
