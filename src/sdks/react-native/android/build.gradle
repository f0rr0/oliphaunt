}

def runtimeResourceManifestValue = { String packageName, String key ->
  def root = runtimeResourcesRoot()
  if (root == null) {
    return null
  }
  def manifest = new File(new File(root, packageName), "manifest.properties")
  if (!manifest.isFile()) {
    return null
  }
  def properties = new Properties()
  manifest.withInputStream { properties.load(it) }
  return properties.getProperty(key)
}

