def boolOption = { String propertyName, String environmentName, boolean defaultValue ->
  def raw = oliphauntProperty(propertyName) ?: System.getenv(environmentName)
  if (raw == null || raw.toString().isBlank()) {
    return defaultValue
  }
  switch (raw.toString().trim().toLowerCase(Locale.ROOT)) {
    case "1":
    case "true":
    case "yes":
    case "on":
      return true
    case "0":
    case "false":
    case "no":
    case "off":
      return false
    default:
      throw new GradleException("${propertyName} must be a boolean value, got '${raw}'")
  }
}
