def parsePortableList = { String raw, String label ->
  if (raw == null || raw.isBlank()) {
    return []
  }
  def portableNamePattern = ~/^[A-Za-z0-9._-]{1,128}$/
  def values = raw.split(",")
    .collect { it.trim() }
    .findAll { !it.isEmpty() }
    .toSet()
    .toList()
    .sort()
  values.each { value ->
    if (!(value ==~ portableNamePattern)) {
      throw new GradleException(
        "liboliphaunt ${label} '${value}' must contain only ASCII letters, digits, '.', '_' or '-'"
      )
    }
  }
  return values
}

def parseExtensions = { String raw ->
  return parsePortableList.call(raw, "extension name")
}

