  package:
    tags: ["package"]
    command: "bash src/sdks/react-native/tools/check-sdk.sh package-shape"
    inputs:
      - "/src/shared/fixtures/**/*"
      - "/src/shared/js-core/**/*"
      - "/package.json"
      - "/pnpm-lock.yaml"
      - "/pnpm-workspace.yaml"
      - "/src/sdks/react-native/**/*"
      - "!/src/sdks/react-native/**/node_modules"
      - "!/src/sdks/react-native/**/node_modules/**"
      - "!/src/sdks/react-native/**/.build"
      - "!/src/sdks/react-native/**/.build/**"
      - "!/src/sdks/react-native/**/.gradle/**"
      - "!/src/sdks/react-native/**/.cxx/**"
      - "!/src/sdks/react-native/**/build/**"
      - "!/src/sdks/react-native/**/lib/**"
      - "!/src/sdks/react-native/ios/vendor/**"
      - "/tools/release/build-sdk-ci-artifacts.sh"
      - "/tools/release/release.py"
    options:
      cache: true
      runFromWorkspaceRoot: true
  package-artifacts:
    tags: ["release", "artifact-package", "ci-react-native-sdk-package"]
    command: "bash tools/release/build-sdk-ci-artifacts.sh oliphaunt-react-native"
    inputs:
