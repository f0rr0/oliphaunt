  e2e:
    tags: ["mobile", "e2e"]
    command: "pnpm --dir src/sdks/react-native/examples/expo run mobile-e2e"
    deps:
      - "oliphaunt-react-native:mobile-build-android"
      - "oliphaunt-react-native:mobile-e2e-android"
      - "oliphaunt-react-native:mobile-build-ios"
      - "oliphaunt-react-native:mobile-e2e-ios"
    inputs:
      - "/Package.swift"
      - "/src/extensions/**/*"
      - "/src/runtimes/liboliphaunt/native/**/*"
      - "/src/sdks/kotlin/**/*"
      - "/src/sdks/react-native/**/*"
      - "!/src/sdks/react-native/**/node_modules"
      - "!/src/sdks/react-native/**/node_modules/**"
      - "!/src/sdks/react-native/**/.build"
      - "!/src/sdks/react-native/**/.build/**"
      - "!/src/sdks/react-native/**/.gradle/**"
      - "!/src/sdks/react-native/**/.cxx/**"
      - "!/src/sdks/react-native/**/build/**"
      - "!/src/sdks/react-native/**/lib/**"
      - "!/src/sdks/react-native/ios/vendor/**"
      - "/src/sdks/swift/**/*"
      - "!/src/sdks/swift/.build"
      - "!/src/sdks/swift/.build/**"
      - "/src/sources/toolchains/android-emulator-runner.toml"
      - "/src/sources/toolchains/maestro.toml"
      - "/tools/dev/setup-maestro.sh"
      - "/package.json"
      - "/pnpm-lock.yaml"
      - "/pnpm-workspace.yaml"
    options:
      cache: false
      runFromWorkspaceRoot: true
      runInCI: false
  mobile-build-android:
    tags: ["mobile", "build", "android", "ci-mobile-build-android"]
    command: "pnpm --dir src/sdks/react-native/examples/expo run mobile-build:android"
    deps:
      - "oliphaunt-kotlin:package-artifacts"
      - "oliphaunt-react-native:package-artifacts"
    inputs:
      - "/src/extensions/**/*"
      - "/target/extension-artifacts/**/*"
      - "/target/sdk-artifacts/oliphaunt-kotlin/**/*"
      - "/target/sdk-artifacts/oliphaunt-react-native/**/*"
      - "/src/runtimes/liboliphaunt/native/**/*"
      - "/src/sdks/kotlin/**/*"
      - "/src/sdks/react-native/**/*"
      - "!/src/sdks/react-native/**/node_modules"
      - "!/src/sdks/react-native/**/node_modules/**"
      - "!/src/sdks/react-native/**/.build"
      - "!/src/sdks/react-native/**/.build/**"
      - "!/src/sdks/react-native/**/.gradle/**"
      - "!/src/sdks/react-native/**/.cxx/**"
      - "!/src/sdks/react-native/**/build/**"
      - "!/src/sdks/react-native/**/lib/**"
      - "!/src/sdks/react-native/ios/vendor/**"
      - "/package.json"
      - "/pnpm-lock.yaml"
      - "/pnpm-workspace.yaml"
      - "/src/sdks/react-native/tools/expo-android-runner.sh"
    outputs:
      - "/target/mobile-build/react-native/android/**/*"
    options:
      cache: false
      runFromWorkspaceRoot: true
  mobile-e2e-android:
    tags: ["mobile", "e2e", "android"]
    command: "pnpm --dir src/sdks/react-native/examples/expo run mobile-e2e:android"
    deps:
      - target: "oliphaunt-react-native:mobile-build-android"
        cacheStrategy: "outputs"
    inputs:
      - "/src/sdks/react-native/examples/expo/src/**/*"
      - "/src/sdks/react-native/examples/expo/maestro/**/*"
      - "/src/sdks/react-native/examples/expo/package.json"
      - "/src/sdks/react-native/tools/mobile-e2e.sh"
      - "/src/sdks/react-native/tools/expo-runner-common.sh"
      - "/src/sdks/react-native/tools/expo-runner-metro.sh"
      - "/src/sdks/react-native/tools/expo-runner-reporting.sh"
      - "/src/sdks/react-native/tools/expo-runner-runtime-resources.sh"
      - "/src/sdks/react-native/tools/expo-runner-workspace.sh"
      - "/src/sdks/react-native/tools/expo-runner-android-device.sh"
      - "/src/sdks/react-native/tools/mobile-extension-runtime.sh"
      - "/src/sources/toolchains/android-emulator-runner.toml"
      - "/src/sources/toolchains/maestro.toml"
      - "/tools/dev/setup-maestro.sh"
      - "/target/mobile-build/react-native/android/**/*"
      - "/src/sdks/react-native/tools/expo-android-runner.sh"
    options:
      cache: false
      runFromWorkspaceRoot: true
      runInCI: skip
  mobile-drill-android:
    tags: ["mobile", "drill", "android"]
    command: "pnpm --dir src/sdks/react-native/examples/expo run mobile-drill:android"
    deps:
      - "oliphaunt-kotlin:smoke"
    inputs:
      - "/src/extensions/**/*"
      - "/src/runtimes/liboliphaunt/native/**/*"
      - "/src/sdks/kotlin/**/*"
      - "/src/sdks/react-native/**/*"
      - "!/src/sdks/react-native/**/node_modules"
      - "!/src/sdks/react-native/**/node_modules/**"
      - "!/src/sdks/react-native/**/.build"
      - "!/src/sdks/react-native/**/.build/**"
      - "!/src/sdks/react-native/**/.gradle/**"
      - "!/src/sdks/react-native/**/.cxx/**"
      - "!/src/sdks/react-native/**/build/**"
      - "!/src/sdks/react-native/**/lib/**"
      - "!/src/sdks/react-native/ios/vendor/**"
      - "/package.json"
      - "/pnpm-lock.yaml"
      - "/pnpm-workspace.yaml"
      - "/src/sdks/react-native/tools/expo-android-runner.sh"
    options:
      cache: false
      runFromWorkspaceRoot: true
      runInCI: false
  mobile-build-ios:
    tags: ["mobile", "build", "ios", "ci-mobile-build-ios"]
    command: "pnpm --dir src/sdks/react-native/examples/expo run mobile-build:ios"
    deps:
      - "oliphaunt-swift:package-artifacts"
      - "oliphaunt-react-native:package-artifacts"
    inputs:
      - "/Package.swift"
      - "/src/extensions/**/*"
      - "/target/extension-artifacts/**/*"
      - "/target/sdk-artifacts/oliphaunt-react-native/**/*"
      - "/target/sdk-artifacts/oliphaunt-swift/**/*"
      - "/src/runtimes/liboliphaunt/native/**/*"
      - "/src/sdks/react-native/**/*"
      - "!/src/sdks/react-native/**/node_modules"
      - "!/src/sdks/react-native/**/node_modules/**"
      - "!/src/sdks/react-native/**/.build"
      - "!/src/sdks/react-native/**/.build/**"
      - "!/src/sdks/react-native/**/.gradle/**"
