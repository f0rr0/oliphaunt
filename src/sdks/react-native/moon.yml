$schema: "https://moonrepo.dev/schemas/project.json"

id: "oliphaunt-react-native"
language: "typescript"
layer: "library"
stack: "frontend"
tags: ["sdk", "react-native", "typescript", "ios", "android", "release-product"]
dependsOn:
  - "oliphaunt-swift"
  - "oliphaunt-kotlin"
  - "shared-js-core"
  - id: "shared-fixtures"
    scope: "build"

project:
  title: "Oliphaunt React Native SDK"
  description: "React Native New Architecture SDK over the Swift and Kotlin Oliphaunt SDKs."
  owner: "oliphaunt"
  release:
    component: "oliphaunt-react-native"
    packagePath: "src/sdks/react-native"

owners:
  defaultOwner: "@oliphaunt/sdk-react-native"
  paths:
    "**/*.ts": ["@oliphaunt/sdk-react-native"]
    "**/*.tsx": ["@oliphaunt/sdk-react-native"]
    "ios/**": ["@oliphaunt/sdk-react-native", "@oliphaunt/sdk-swift"]
    "android/**": ["@oliphaunt/sdk-react-native", "@oliphaunt/sdk-android"]

tasks:
  check:
    tags: ["quality", "static"]
    command: "bash src/sdks/react-native/tools/check-sdk.sh check-static"
    deps:
      - "shared-contracts:check"
      - "shared-js-core:check"
    inputs:
      - "/src/shared/fixtures/**/*"
      - "/src/shared/js-core/**/*"
      - "/package.json"
      - "/pnpm-lock.yaml"
      - "/pnpm-workspace.yaml"
      - "/src/sdks/react-native/**/*"
      - "!/src/sdks/react-native/**/node_modules"
      - "!/src/sdks/react-native/**/node_modules/**"
      - "!/src/sdks/react-native/**/.build"
      - "!/src/sdks/react-native/**/.build/**"
      - "!/src/sdks/react-native/**/.gradle/**"
      - "!/src/sdks/react-native/**/.cxx/**"
      - "!/src/sdks/react-native/**/build/**"
      - "!/src/sdks/react-native/**/lib/**"
      - "!/src/sdks/react-native/ios/vendor/**"
      - "/tools/release/release.py"
    options:
      cache: true
      runFromWorkspaceRoot: true
  build-ios-bridge:
    tags: ["build", "ios", "react-native-new-architecture"]
    command: "bash src/sdks/react-native/tools/check-sdk.sh build-ios-bridge"
    deps:
      - "oliphaunt-swift:check"
    inputs:
      - "/Package.swift"
      - "/src/shared/fixtures/**/*"
      - "/src/shared/js-core/**/*"
      - "/package.json"
      - "/pnpm-lock.yaml"
      - "/pnpm-workspace.yaml"
      - "/src/runtimes/liboliphaunt/native/include/oliphaunt.h"
      - "/src/sdks/react-native/**/*"
      - "!/src/sdks/react-native/**/node_modules"
      - "!/src/sdks/react-native/**/node_modules/**"
      - "!/src/sdks/react-native/**/.build"
      - "!/src/sdks/react-native/**/.build/**"
      - "!/src/sdks/react-native/**/.gradle/**"
      - "!/src/sdks/react-native/**/.cxx/**"
      - "!/src/sdks/react-native/**/build/**"
      - "!/src/sdks/react-native/**/lib/**"
      - "!/src/sdks/react-native/ios/vendor/**"
      - "/src/sdks/swift/**/*"
      - "!/src/sdks/swift/.build"
      - "!/src/sdks/swift/.build/**"
      - "/tools/release/release.py"
    options:
      cache: true
      runFromWorkspaceRoot: true
  build-android-bridge:
    tags: ["build", "android", "react-native-new-architecture"]
    command: "bash src/sdks/react-native/tools/check-sdk.sh build-android-bridge"
    deps:
      - "oliphaunt-kotlin:check"
      - "shared-contracts:check"
      - "shared-js-core:check"
    inputs:
      - "/src/shared/fixtures/**/*"
      - "/src/shared/js-core/**/*"
      - "/package.json"
      - "/pnpm-lock.yaml"
      - "/pnpm-workspace.yaml"
      - "/src/runtimes/liboliphaunt/native/include/oliphaunt.h"
      - "/src/sdks/kotlin/**/*"
      - "/src/sdks/react-native/**/*"
      - "!/src/sdks/react-native/**/node_modules"
      - "!/src/sdks/react-native/**/node_modules/**"
      - "!/src/sdks/react-native/**/.build"
      - "!/src/sdks/react-native/**/.build/**"
      - "!/src/sdks/react-native/**/.gradle/**"
      - "!/src/sdks/react-native/**/.cxx/**"
      - "!/src/sdks/react-native/**/build/**"
      - "!/src/sdks/react-native/**/lib/**"
      - "!/src/sdks/react-native/ios/vendor/**"
      - "/tools/release/release.py"
    options:
      cache: true
      runFromWorkspaceRoot: true
  test:
    tags: ["quality", "unit"]
    command: "bash src/sdks/react-native/tools/check-sdk.sh test-unit"
    deps:
      - "shared-fixtures:check"
      - "shared-js-core:check"
    inputs:
      - "/src/shared/fixtures/**/*"
      - "/src/shared/js-core/**/*"
      - "/package.json"
      - "/pnpm-lock.yaml"
      - "/pnpm-workspace.yaml"
      - "/src/sdks/react-native/**/*"
      - "!/src/sdks/react-native/**/node_modules"
      - "!/src/sdks/react-native/**/node_modules/**"
      - "!/src/sdks/react-native/**/.build"
      - "!/src/sdks/react-native/**/.build/**"
      - "!/src/sdks/react-native/**/.gradle/**"
      - "!/src/sdks/react-native/**/.cxx/**"
      - "!/src/sdks/react-native/**/build/**"
      - "!/src/sdks/react-native/**/lib/**"
      - "!/src/sdks/react-native/ios/vendor/**"
      - "/tools/test/**/*"
    options:
      cache: true
      runFromWorkspaceRoot: true
  smoke:
    tags: ["runtime", "smoke"]
    command: "pnpm --dir src/sdks/react-native/examples/expo run smoke"
    deps:
      - "oliphaunt-swift:smoke"
      - "oliphaunt-kotlin:smoke"
    inputs:
      - "/Package.swift"
      - "/src/extensions/**/*"
      - "/src/runtimes/liboliphaunt/native/**/*"
      - "/src/sdks/kotlin/**/*"
      - "/src/sdks/react-native/**/*"
      - "!/src/sdks/react-native/**/node_modules"
      - "!/src/sdks/react-native/**/node_modules/**"
      - "!/src/sdks/react-native/**/.build"
      - "!/src/sdks/react-native/**/.build/**"
      - "!/src/sdks/react-native/**/.gradle/**"
      - "!/src/sdks/react-native/**/.cxx/**"
      - "!/src/sdks/react-native/**/build/**"
      - "!/src/sdks/react-native/**/lib/**"
      - "!/src/sdks/react-native/ios/vendor/**"
      - "/src/sdks/swift/**/*"
      - "!/src/sdks/swift/.build"
      - "!/src/sdks/swift/.build/**"
      - "/package.json"
      - "/pnpm-lock.yaml"
      - "/pnpm-workspace.yaml"
    options:
      cache: local
      runFromWorkspaceRoot: true
  smoke-android:
    tags: ["runtime", "smoke", "android"]
    command: "pnpm --dir src/sdks/react-native/examples/expo run smoke:android"
    deps:
      - "oliphaunt-kotlin:smoke"
    inputs:
      - "/src/extensions/**/*"
      - "/src/runtimes/liboliphaunt/native/**/*"
      - "/src/sdks/kotlin/**/*"
      - "/src/sdks/react-native/**/*"
      - "!/src/sdks/react-native/**/node_modules"
      - "!/src/sdks/react-native/**/node_modules/**"
      - "!/src/sdks/react-native/**/.build"
      - "!/src/sdks/react-native/**/.build/**"
      - "!/src/sdks/react-native/**/.gradle/**"
      - "!/src/sdks/react-native/**/.cxx/**"
      - "!/src/sdks/react-native/**/build/**"
      - "!/src/sdks/react-native/**/lib/**"
      - "!/src/sdks/react-native/ios/vendor/**"
      - "/package.json"
      - "/pnpm-lock.yaml"
      - "/pnpm-workspace.yaml"
    options:
      cache: local
      runFromWorkspaceRoot: true
  smoke-ios:
    tags: ["runtime", "smoke", "ios"]
    command: "pnpm --dir src/sdks/react-native/examples/expo run smoke:ios"
    deps:
      - "oliphaunt-swift:smoke"
    inputs:
      - "/Package.swift"
      - "/src/extensions/**/*"
      - "/src/runtimes/liboliphaunt/native/**/*"
      - "/src/sdks/react-native/**/*"
      - "!/src/sdks/react-native/**/node_modules"
      - "!/src/sdks/react-native/**/node_modules/**"
      - "!/src/sdks/react-native/**/.build"
      - "!/src/sdks/react-native/**/.build/**"
      - "!/src/sdks/react-native/**/.gradle/**"
      - "!/src/sdks/react-native/**/.cxx/**"
      - "!/src/sdks/react-native/**/build/**"
      - "!/src/sdks/react-native/**/lib/**"
      - "!/src/sdks/react-native/ios/vendor/**"
      - "/src/sdks/swift/**/*"
      - "!/src/sdks/swift/.build"
      - "!/src/sdks/swift/.build/**"
      - "/package.json"
      - "/pnpm-lock.yaml"
      - "/pnpm-workspace.yaml"
    options:
      cache: local
      runFromWorkspaceRoot: true
  smoke-mobile:
    tags: ["runtime", "smoke", "mobile"]
    command: "pnpm --dir src/sdks/react-native/examples/expo run smoke"
    deps:
      - "oliphaunt-swift:smoke"
      - "oliphaunt-kotlin:smoke"
    inputs:
      - "/Package.swift"
      - "/src/extensions/**/*"
      - "/src/runtimes/liboliphaunt/native/**/*"
      - "/src/sdks/kotlin/**/*"
      - "/src/sdks/react-native/**/*"
      - "!/src/sdks/react-native/**/node_modules"
      - "!/src/sdks/react-native/**/node_modules/**"
      - "!/src/sdks/react-native/**/.build"
      - "!/src/sdks/react-native/**/.build/**"
      - "!/src/sdks/react-native/**/.gradle/**"
      - "!/src/sdks/react-native/**/.cxx/**"
      - "!/src/sdks/react-native/**/build/**"
      - "!/src/sdks/react-native/**/lib/**"
      - "!/src/sdks/react-native/ios/vendor/**"
      - "/src/sdks/swift/**/*"
      - "!/src/sdks/swift/.build"
      - "!/src/sdks/swift/.build/**"
      - "/package.json"
      - "/pnpm-lock.yaml"
      - "/pnpm-workspace.yaml"
