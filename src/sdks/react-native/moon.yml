  release-check:
    tags: ["release", "package"]
    command: "bash src/sdks/react-native/tools/check-sdk.sh release-check"
    deps:
      - "oliphaunt-swift:release-check"
      - "oliphaunt-kotlin:release-check"
    inputs:
      - "/src/shared/fixtures/**/*"
      - "/src/shared/js-core/**/*"
