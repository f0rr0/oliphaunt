      - "/pnpm-lock.yaml"
      - "/pnpm-workspace.yaml"
      - "/src/runtimes/liboliphaunt/native/include/oliphaunt.h"
      - "/src/sdks/kotlin/**/*"
      - "/src/sdks/react-native/**/*"
      - "!/src/sdks/react-native/**/node_modules"
      - "!/src/sdks/react-native/**/node_modules/**"
      - "!/src/sdks/react-native/**/.build"
      - "!/src/sdks/react-native/**/.build/**"
