$schema: "https://moonrepo.dev/schemas/project.json"

id: "oliphaunt-extension-intarray"
language: "unknown"
layer: "library"
stack: "systems"
tags: ["extensions", "contrib", "postgres18", "release-product"]
dependsOn:
  - id: "extension-contrib-postgres18"
    scope: "production"
  - id: "extension-runtime-contract"
    scope: "production"
  - id: "liboliphaunt-native"
    scope: "production"
  - id: "liboliphaunt-wasix"
    scope: "production"

project:
  release:
    component: "oliphaunt-extension-intarray"
    packagePath: "src/extensions/contrib/intarray"

tasks:
  check:
    tags: ["quality", "static"]
    command: "bun src/extensions/tools/check-extension-tree.mjs src/extensions/contrib/intarray"
    deps:
      - "extension-contrib-postgres18:check"
      - "extension-runtime-contract:check"
    inputs:
      - "/src/extensions/contrib/intarray/**/*"
      - "/src/extensions/contrib/postgres18.toml"
      - "/src/extensions/tools/check-extension-tree.mjs"
      - "/src/shared/extension-runtime-contract/**/*"
    options:
      cache: true
      runFromWorkspaceRoot: true

  assemble-release:
    tags: ["release", "artifact-package"]
    command: "bash tools/dev/bun.sh tools/release/build-extension-ci-artifacts.mjs oliphaunt-extension-intarray --require-native --require-wasix"
    deps:
      - "oliphaunt-extension-intarray:check"
    inputs:
      - "/.release-please-manifest.json"
      - "/release-please-config.json"
      - "/src/extensions/contrib/intarray/**/*"
      - "/src/extensions/contrib/postgres18.toml"
      - "/src/extensions/generated/wasix/extensions.json"
      - "/tools/release/build-extension-ci-artifacts.mjs"
      - "/tools/release/release-artifact-targets.mjs"
      - "/tools/release/release-graph.mjs"
      - "/target/extensions/native/release-assets/**/*"
      - "/target/extensions/wasix/release-assets/**/*"
    outputs:
      - "/target/extension-artifacts/oliphaunt-extension-intarray/**/*"
    options:
      cache: false
      runFromWorkspaceRoot: true
