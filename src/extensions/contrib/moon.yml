$schema: "https://moonrepo.dev/schemas/project.json"

id: "oliphaunt-extension-contrib-pg18"
language: "unknown"
layer: "library"
stack: "systems"
tags: ["extensions", "contrib", "pg18", "release-product"]
dependsOn:
  - "postgres18"
  - "extension-runtime-contract"
  - "liboliphaunt-native"
  - "liboliphaunt-wasix"

project:
  title: "PostgreSQL 18 Contrib Extensions"
  description: "PostgreSQL contrib extension definitions tied to the active PostgreSQL 18.4 source baseline."
  owner: "oliphaunt"
  release:
    component: "oliphaunt-extension-contrib-pg18"
    packagePath: "src/extensions/contrib"

tasks:
  check:
    tags: ["quality", "static"]
    command: "bun src/extensions/tools/check-extension-tree.mjs src/extensions/contrib"
    deps:
      - "postgres18:check"
      - "extension-runtime-contract:check"
    inputs:
      - "/src/extensions/contrib/**/*"
      - "/src/extensions/tools/check-extension-tree.mjs"
      - "/src/postgres/versions/18/**/*"
      - "/src/shared/extension-runtime-contract/**/*"
    options:
      cache: true
      runFromWorkspaceRoot: true

  assemble-release:
    tags: ["release", "artifact-package"]
    command: "bash tools/dev/bun.sh tools/release/build-extension-ci-artifacts.mjs oliphaunt-extension-contrib-pg18 --require-native --require-wasix"
    deps:
      - "oliphaunt-extension-contrib-pg18:check"
    inputs:
      - "/.release-please-manifest.json"
      - "/release-please-config.json"
      - "/src/extensions/contrib/**/*"
      - "/src/extensions/generated/wasix/extensions.json"
      - "/tools/release/build-extension-ci-artifacts.mjs"
      - "/tools/release/extension-runtime-asset-contract.mjs"
      - "/tools/release/release-artifact-targets.mjs"
      - "/tools/release/release-graph.mjs"
      - "/target/extensions/native/release-assets/**/*"
      - "/target/extensions/wasix/release-assets/**/*"
    outputs:
      - "/target/extension-artifacts/oliphaunt-extension-contrib-pg18/**/*"
    options:
      cache: false
      runFromWorkspaceRoot: true
