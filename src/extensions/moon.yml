$schema: "https://moonrepo.dev/schemas/project.json"

id: "extensions"
language: "unknown"
layer: "configuration"
stack: "systems"
tags: ["extensions", "catalog", "assets"]
dependsOn:
  - id: "postgres18"
    scope: "build"
  - id: "extension-runtime-contract"
    scope: "build"
  - id: "extension-contrib-postgres18"
    scope: "build"
  - id: "extension-age"
    scope: "build"
  - id: "oliphaunt-extension-amcheck"
    scope: "build"
  - id: "oliphaunt-extension-auto-explain"
    scope: "build"
  - id: "oliphaunt-extension-bloom"
    scope: "build"
  - id: "oliphaunt-extension-btree-gin"
    scope: "build"
  - id: "oliphaunt-extension-btree-gist"
    scope: "build"
  - id: "oliphaunt-extension-citext"
    scope: "build"
  - id: "oliphaunt-extension-cube"
    scope: "build"
  - id: "oliphaunt-extension-dict-int"
    scope: "build"
  - id: "oliphaunt-extension-dict-xsyn"
    scope: "build"
  - id: "oliphaunt-extension-earthdistance"
    scope: "build"
  - id: "oliphaunt-extension-file-fdw"
    scope: "build"
  - id: "oliphaunt-extension-fuzzystrmatch"
    scope: "build"
  - id: "oliphaunt-extension-hstore"
    scope: "build"
  - id: "oliphaunt-extension-intarray"
    scope: "build"
  - id: "oliphaunt-extension-isn"
    scope: "build"
  - id: "oliphaunt-extension-lo"
    scope: "build"
  - id: "oliphaunt-extension-ltree"
    scope: "build"
  - id: "oliphaunt-extension-pageinspect"
    scope: "build"
  - id: "oliphaunt-extension-pg-buffercache"
    scope: "build"
  - id: "oliphaunt-extension-pg-freespacemap"
    scope: "build"
  - id: "oliphaunt-extension-pg-surgery"
    scope: "build"
  - id: "oliphaunt-extension-pg-trgm"
    scope: "build"
  - id: "oliphaunt-extension-pg-visibility"
    scope: "build"
  - id: "oliphaunt-extension-pg-walinspect"
    scope: "build"
  - id: "oliphaunt-extension-pgcrypto"
    scope: "build"
  - id: "oliphaunt-extension-seg"
    scope: "build"
  - id: "oliphaunt-extension-tablefunc"
    scope: "build"
  - id: "oliphaunt-extension-tcn"
    scope: "build"
  - id: "oliphaunt-extension-tsm-system-rows"
    scope: "build"
  - id: "oliphaunt-extension-tsm-system-time"
    scope: "build"
  - id: "oliphaunt-extension-unaccent"
    scope: "build"
  - id: "oliphaunt-extension-uuid-ossp"
    scope: "build"
  - id: "oliphaunt-extension-pg-hashids"
    scope: "build"
  - id: "oliphaunt-extension-pg-ivm"
    scope: "build"
  - id: "oliphaunt-extension-pg-textsearch"
    scope: "build"
  - id: "oliphaunt-extension-pg-uuidv7"
    scope: "build"
  - id: "oliphaunt-extension-pgtap"
    scope: "build"
  - id: "oliphaunt-extension-postgis"
    scope: "build"
  - id: "oliphaunt-extension-vector"
    scope: "build"

project:
  title: "Extension Catalog"
  description: "Exact SQL extension catalog, build plans, and generated tables."
  owner: "oliphaunt"

owners:
  defaultOwner: "@oliphaunt/core"
  paths:
    "**/*": ["@oliphaunt/core"]

tasks:
  check:
    tags: ["quality", "static"]
    command: "node tools/policy/check-source-inputs.mjs extensions"
    deps:
      - "postgres18:check"
      - "extension-runtime-contract:check"
      - "extension-contrib-postgres18:check"
      - "extension-age:check"
      - "oliphaunt-extension-amcheck:check"
      - "oliphaunt-extension-auto-explain:check"
      - "oliphaunt-extension-bloom:check"
      - "oliphaunt-extension-btree-gin:check"
      - "oliphaunt-extension-btree-gist:check"
      - "oliphaunt-extension-citext:check"
      - "oliphaunt-extension-cube:check"
      - "oliphaunt-extension-dict-int:check"
      - "oliphaunt-extension-dict-xsyn:check"
      - "oliphaunt-extension-earthdistance:check"
      - "oliphaunt-extension-file-fdw:check"
      - "oliphaunt-extension-fuzzystrmatch:check"
      - "oliphaunt-extension-hstore:check"
      - "oliphaunt-extension-intarray:check"
      - "oliphaunt-extension-isn:check"
      - "oliphaunt-extension-lo:check"
      - "oliphaunt-extension-ltree:check"
      - "oliphaunt-extension-pageinspect:check"
      - "oliphaunt-extension-pg-buffercache:check"
      - "oliphaunt-extension-pg-freespacemap:check"
      - "oliphaunt-extension-pg-surgery:check"
      - "oliphaunt-extension-pg-trgm:check"
      - "oliphaunt-extension-pg-visibility:check"
      - "oliphaunt-extension-pg-walinspect:check"
      - "oliphaunt-extension-pgcrypto:check"
      - "oliphaunt-extension-seg:check"
      - "oliphaunt-extension-tablefunc:check"
      - "oliphaunt-extension-tcn:check"
      - "oliphaunt-extension-tsm-system-rows:check"
      - "oliphaunt-extension-tsm-system-time:check"
      - "oliphaunt-extension-unaccent:check"
      - "oliphaunt-extension-uuid-ossp:check"
      - "oliphaunt-extension-pg-hashids:check"
      - "oliphaunt-extension-pg-ivm:check"
      - "oliphaunt-extension-pg-textsearch:check"
      - "oliphaunt-extension-pg-uuidv7:check"
      - "oliphaunt-extension-pgtap:check"
      - "oliphaunt-extension-postgis:check"
      - "oliphaunt-extension-vector:check"
    inputs:
      - "/src/postgres/versions/18/**/*"
      - "/src/shared/extension-runtime-contract/**/*"
      - "/src/extensions/**/*"
      - "/tools/xtask/**/*"
      - "/tools/policy/check-source-inputs.mjs"
      - "/Cargo.lock"
      - "/Cargo.toml"
    options:
      cache: true
      runFromWorkspaceRoot: true
