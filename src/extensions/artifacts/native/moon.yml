$schema: "https://moonrepo.dev/schemas/project.json"

id: "extension-artifacts-native"
language: "unknown"
layer: "tool"
stack: "systems"
tags: ["extensions", "artifacts", "native"]
dependsOn:
  - id: "extension-model"
    scope: "build"
  - id: "extensions"
    scope: "build"
  - id: "liboliphaunt-native"
    scope: "build"
  - id: "source-inputs"
    scope: "build"

project:
  title: "Native Extension Artifacts"
  description: "Publishable exact-extension artifact checks for native liboliphaunt targets."
  owner: "oliphaunt"

tasks:
  check:
    tags: ["quality", "static"]
    command: "tools/dev/bun.sh src/extensions/tools/check-extension-model.mjs --check"
    deps:
      - "extension-model:check"
    inputs:
      - "/src/extensions/**/*"
      - "/src/shared/extension-runtime-contract/**/*"
      - "/tools/release/release_graph_query.mjs"
      - "/tools/release/release-artifact-targets.mjs"
      - "/tools/release/release-graph.mjs"
      - "/tools/xtask/**/*"
      - "/Cargo.lock"
      - "/Cargo.toml"
    options:
      cache: true
      runFromWorkspaceRoot: true
  release-check:
    tags: ["release", "package"]
    command: "bash src/extensions/artifacts/native/tools/check-release-artifacts.sh"
    env:
      OLIPHAUNT_TRACK_BUILD: "missing"
    deps:
      - "extension-artifacts-native:check"
      - "source-inputs:source-fetch-native-runtime"
    inputs:
      - "/Cargo.lock"
      - "/Cargo.toml"
      - "/rust-toolchain.toml"
      - "/src/extensions/**/*"
      - "!/src/extensions/generated/docs"
      - "!/src/extensions/generated/docs/**"
      - "!/src/extensions/evidence"
      - "!/src/extensions/evidence/**"
      - "/src/postgres/versions/18/**/*"
      - "/src/runtimes/liboliphaunt/native/**/*"
      - "/src/shared/extension-runtime-contract/**/*"
      - "/src/sources/third-party/shared/**/*"
      - "/src/sources/third-party/native/**/*"
      - "/tools/xtask/**/*"
    options:
      cache: false
      runFromWorkspaceRoot: true
      runInCI: true
  build-target:
    tags: ["release", "artifact-builder", "ci-extension-artifacts-native"]
    command: "bash src/extensions/artifacts/native/tools/package-release-assets.sh"
    deps:
      - "extension-artifacts-native:check"
      - "source-inputs:source-fetch-native-runtime"
    inputs:
      - "/Cargo.lock"
      - "/Cargo.toml"
      - "/rust-toolchain.toml"
      - "/src/extensions/**/*"
      - "!/src/extensions/generated/docs"
      - "!/src/extensions/generated/docs/**"
      - "!/src/extensions/evidence"
      - "!/src/extensions/evidence/**"
      - "/src/postgres/versions/18/**/*"
      - "/src/runtimes/liboliphaunt/native/**/*"
      - "/src/shared/extension-runtime-contract/**/*"
      - "/src/sources/third-party/shared/**/*"
      - "/src/sources/third-party/native/**/*"
      - "/tools/xtask/**/*"
    outputs:
      - "/target/extensions/native/release-assets/**/*"
    options:
      cache: false
      runFromWorkspaceRoot: true
      runInCI: true
