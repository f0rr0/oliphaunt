$schema: "https://moonrepo.dev/schemas/project.json"

id: "extension-artifacts-wasix"
language: "unknown"
layer: "tool"
stack: "systems"
tags: ["extensions", "artifacts", "wasix"]
dependsOn:
  - id: "extension-model"
    scope: "build"
  - id: "extensions"
    scope: "build"
  - id: "liboliphaunt-wasix"
    scope: "build"
  - id: "source-inputs"
    scope: "build"

project:
  title: "WASIX Extension Artifacts"
  description: "Publishable exact-extension artifact checks for the WASIX runtime."
  owner: "oliphaunt"

tasks:
  check:
    tags: ["quality", "static"]
    command: "python3 src/extensions/tools/check-extension-model.py --check"
    deps:
      - "extension-model:check"
    inputs:
      - "/src/extensions/**/*"
      - "/src/shared/extension-runtime-contract/**/*"
      - "/tools/release/release_graph_query.mjs"
      - "/tools/release/release-artifact-targets.mjs"
      - "/tools/release/release-graph.mjs"
      - "/tools/xtask/**/*"
      - "/Cargo.lock"
      - "/Cargo.toml"
    options:
      cache: true
      runFromWorkspaceRoot: true
  build-target:
    tags: ["release", "artifact-builder", "ci-extension-artifacts-wasix"]
    command: "bash src/extensions/artifacts/wasix/tools/package-release-assets.sh"
    deps:
      - "extension-artifacts-wasix:check"
      - "liboliphaunt-wasix:runtime-portable"
    inputs:
      - "/Cargo.lock"
      - "/Cargo.toml"
      - "/rust-toolchain.toml"
      - "/src/extensions/**/*"
      - "!/src/extensions/generated/docs"
      - "!/src/extensions/generated/docs/**"
      - "!/src/extensions/evidence"
      - "!/src/extensions/evidence/**"
      - "/src/postgres/versions/18/**/*"
      - "/src/runtimes/liboliphaunt/wasix/**/*"
      - "/src/shared/extension-runtime-contract/**/*"
      - "/tools/xtask/**/*"
    outputs:
      - "/target/extensions/wasix/release-assets/**/*"
    options:
      cache: false
      runFromWorkspaceRoot: true
      runInCI: true
