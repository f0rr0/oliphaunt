schema = "oliphaunt-extension-recipe-v1"
sql_name = "pgtap"
display_name = "pgTAP"
kind = "external-simple-pgxs"
license = "PostgreSQL"
source = "pgtap"
postgres_majors = [18]

[lifecycle]
creates_extension = true
requires = ["plpgsql"]
implicit_sql_dependencies = []
load_sql = []
post_create_sql = []
shared_preload_libraries = []
restart_required = false
background_workers = false
shared_memory = false
session_load_required = false
needs_superuser = false
trusted = false

[artifacts]
control_files = ["share/postgresql/extension/pgtap.control"]
sql_globs = ["share/postgresql/extension/pgtap--*.sql"]
extension_sql_file_prefixes = [
  "pgtap-core",
  "pgtap-schema",
]
extension_sql_file_names = ["uninstall_pgtap.sql"]
native_modules = []
native_dependency_modules = []
data_files = []
headers = []
licenses = []

[support.native]
direct = "supported"
broker = "supported"
server = "supported"

[support.wasix]
direct = "supported"
server = "supported"

[support.mobile]
ios = "supported"
android = "supported"
