id = "oliphaunt-extension-pgtap"
owner = "@oliphaunt/extensions"
kind = "exact-extension-artifact"
publish_targets = [
  "github-release-assets",
  "npm",
  "maven-central",
  "crates-io",
]
registry_packages = [
  "crates:oliphaunt-extension-pgtap",
  "crates:oliphaunt-extension-pgtap-linux-arm64-gnu",
  "crates:oliphaunt-extension-pgtap-linux-x64-gnu",
  "crates:oliphaunt-extension-pgtap-macos-arm64",
  "crates:oliphaunt-extension-pgtap-wasix",
  "crates:oliphaunt-extension-pgtap-windows-x64-msvc",
  "npm:@oliphaunt/extension-pgtap",
  "npm:@oliphaunt/extension-pgtap-linux-arm64-gnu",
  "npm:@oliphaunt/extension-pgtap-linux-x64-gnu",
  "npm:@oliphaunt/extension-pgtap-macos-arm64",
  "npm:@oliphaunt/extension-pgtap-windows-x64-msvc",
  "maven:dev.oliphaunt.extensions:oliphaunt-extension-pgtap-android-arm64-v8a",
  "maven:dev.oliphaunt.extensions:oliphaunt-extension-pgtap-android-x86_64",
]
release_artifacts = ["exact-extension-artifacts"]
extension_sql_name = "pgtap"

[extension]
sql_name = "pgtap"
class = "external"
versioning = "upstream-bound"

[extension.source]
path = "src/extensions/external/pgtap/source.toml"

[extension.compatibility]
postgres_major = "18"
extension_runtime_contract = "src/shared/extension-runtime-contract/contract.toml"
native_runtime_product = "liboliphaunt-native"
native_runtime_version = "0.0.0"
wasix_runtime_product = "liboliphaunt-wasix"
wasix_runtime_version = "0.0.0"
[compatibility_versions.oliphaunt-extension-pgtap-liboliphaunt-native]
source_product = "liboliphaunt-native"
path = "src/extensions/external/pgtap/release.toml"
parser = "toml:extension.compatibility.native_runtime_version"

[compatibility_versions.oliphaunt-extension-pgtap-liboliphaunt-wasix]
source_product = "liboliphaunt-wasix"
path = "src/extensions/external/pgtap/release.toml"
parser = "toml:extension.compatibility.wasix_runtime_version"
