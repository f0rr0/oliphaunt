$schema: "https://moonrepo.dev/schemas/project.json"

id: "oliphaunt-extension-pgtap"
language: "unknown"
layer: "library"
stack: "systems"
tags: ["extensions", "external", "release-product"]
dependsOn:
  - "extension-runtime-contract"
  - id: "liboliphaunt-native"
    scope: "production"
  - id: "liboliphaunt-wasix"
    scope: "production"

project:
  release:
    component: "oliphaunt-extension-pgtap"
    packagePath: "src/extensions/external/pgtap"

tasks:
  check:
    tags: ["quality", "static"]
    command: "bun src/extensions/tools/check-extension-tree.mjs src/extensions/external/pgtap"
    deps:
      - "extension-runtime-contract:check"
    inputs:
      - "/src/extensions/external/pgtap/**/*"
      - "/src/extensions/tools/check-extension-tree.mjs"
      - "/src/shared/extension-runtime-contract/**/*"
    options:
      cache: true
      runFromWorkspaceRoot: true

  assemble-release:
    tags: ["release", "artifact-package"]
    command: "python3 tools/release/build-extension-ci-artifacts.py oliphaunt-extension-pgtap --require-native --require-wasix"
    deps:
      - "oliphaunt-extension-pgtap:check"
    inputs:
      - "/.release-please-manifest.json"
      - "/release-please-config.json"
      - "/src/extensions/external/pgtap/**/*"
      - "/src/extensions/generated/wasix/extensions.json"
      - "/tools/release/build-extension-ci-artifacts.py"
      - "/tools/release/extension_artifact_targets.py"
      - "/tools/release/product_metadata.py"
      - "/target/extensions/native/release-assets/**/*"
      - "/target/extensions/wasix/release-assets/**/*"
    outputs:
      - "/target/extension-artifacts/oliphaunt-extension-pgtap/**/*"
    options:
      cache: false
      runFromWorkspaceRoot: true
