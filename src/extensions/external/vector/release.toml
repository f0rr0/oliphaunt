id = "oliphaunt-extension-vector"
owner = "@oliphaunt/extensions"
kind = "exact-extension-artifact"
publish_targets = [
  "github-release-assets",
  "npm",
  "maven-central",
  "crates-io",
]
registry_packages = [
  "crates:oliphaunt-extension-vector",
  "crates:oliphaunt-extension-vector-aot-linux-arm64",
  "crates:oliphaunt-extension-vector-aot-linux-x64",
  "crates:oliphaunt-extension-vector-aot-macos-arm64",
  "crates:oliphaunt-extension-vector-aot-windows-x64",
  "crates:oliphaunt-extension-vector-linux-arm64-gnu",
  "crates:oliphaunt-extension-vector-linux-x64-gnu",
  "crates:oliphaunt-extension-vector-macos-arm64",
  "crates:oliphaunt-extension-vector-wasix",
  "crates:oliphaunt-extension-vector-windows-x64-msvc",
  "npm:@oliphaunt/extension-vector",
  "npm:@oliphaunt/extension-vector-linux-arm64-gnu",
  "npm:@oliphaunt/extension-vector-linux-x64-gnu",
  "npm:@oliphaunt/extension-vector-macos-arm64",
  "npm:@oliphaunt/extension-vector-windows-x64-msvc",
  "maven:dev.oliphaunt.extensions:oliphaunt-extension-vector-android-arm64-v8a",
  "maven:dev.oliphaunt.extensions:oliphaunt-extension-vector-android-x86_64",
]
release_artifacts = ["exact-extension-artifacts"]
extension_sql_name = "vector"

[extension]
sql_name = "vector"
class = "external"
versioning = "upstream-bound"

[extension.source]
path = "src/extensions/external/vector/source.toml"

[extension.compatibility]
postgres_major = "18"
extension_runtime_contract = "src/shared/extension-runtime-contract/contract.toml"
native_runtime_product = "liboliphaunt-native"
native_runtime_version = "0.0.0"
wasix_runtime_product = "liboliphaunt-wasix"
wasix_runtime_version = "0.0.0"
[compatibility_versions.oliphaunt-extension-vector-liboliphaunt-native]
source_product = "liboliphaunt-native"
path = "src/extensions/external/vector/release.toml"
parser = "toml:extension.compatibility.native_runtime_version"

[compatibility_versions.oliphaunt-extension-vector-liboliphaunt-wasix]
source_product = "liboliphaunt-wasix"
path = "src/extensions/external/vector/release.toml"
parser = "toml:extension.compatibility.wasix_runtime_version"
