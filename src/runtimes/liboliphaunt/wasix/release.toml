id = "liboliphaunt-wasix"
owner = "@oliphaunt/wasm"
kind = "wasm-runtime"
publish_targets = ["crates-io", "github-release-assets"]
registry_packages = [
  "crates:oliphaunt-wasix-assets",
  "crates:oliphaunt-wasix-aot-aarch64-apple-darwin",
  "crates:oliphaunt-wasix-aot-x86_64-unknown-linux-gnu",
  "crates:oliphaunt-wasix-aot-aarch64-unknown-linux-gnu",
  "crates:oliphaunt-wasix-aot-x86_64-pc-windows-msvc",
]
release_artifacts = [
  "wasix-assets",
  "aot-crates",
  "release-assets",
]
legacy_tag_prefixes = [""]
legacy_version_file = "Cargo.toml"
legacy_version_parser = "cargo"
