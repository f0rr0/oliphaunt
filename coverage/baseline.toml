# Coverage baselines are measured product evidence, not policy placeholders.
# `line_threshold` is the aggregate gate. `per_file_line_threshold` prevents
# aggregate coverage from hiding weak files. `measured_line_coverage` records
# the last committed local/CI measurement for audit only.

[policy]
fail_on_unmeasured_product = true
minimum_new_sdk_line_coverage = 80.0
release_ratchet_percentage_points = 2.0
target_sdk_line_coverage = 85.0

[products.oliphaunt-rust]
tool = "cargo-llvm-cov"
line_threshold = 80.0
measured_line_coverage = 82.56
summary = "target/coverage/oliphaunt-rust/summary.json"
reports = ["target/coverage/oliphaunt-rust/lcov.info"]
source_globs = ["src/sdks/rust/src/*.rs"]
exclude_globs = [
  "src/sdks/rust/tests/**",
  "src/runtimes/liboliphaunt/native/**",
  "src/postgres/versions/18/**",
  "target/**",
]
per_file_line_threshold = 50.0
branch_coverage = "advisory"
function_coverage = "advisory"

[[products.oliphaunt-rust.waivers]]
path = "src/sdks/rust/src/broker.rs"
reason = "broker process orchestration is runtime/integration evidence, not deterministic unit coverage yet"
evidence = "oliphaunt-rust smoke/regression lanes and TypeScript broker helper tests"
owner = "@oliphaunt/core"
expires = "before-0.2.0"

[[products.oliphaunt-rust.waivers]]
path = "src/sdks/rust/src/ipc.rs"
reason = "local IPC framing is exercised through broker integration tests and shared protocol fixtures"
evidence = "oliphaunt-rust broker tests plus src/shared/fixtures/protocol/query-response-cases.json consumers"
owner = "@oliphaunt/core"
expires = "before-0.2.0"

[[products.oliphaunt-rust.waivers]]
path = "src/sdks/rust/src/lib.rs"
reason = "crate root is a re-export surface with no durable executable behavior to line-cover"
evidence = "cargo doctests and SDK package-shape checks"
owner = "@oliphaunt/core"
expires = "before-0.2.0"

[[products.oliphaunt-rust.waivers]]
path = "src/sdks/rust/src/pgwire.rs"
reason = "external wire compatibility is regression evidence rather than SDK wrapper unit coverage"
evidence = "server/client compatibility regression lanes"
owner = "@oliphaunt/core"
expires = "before-0.2.0"

[[products.oliphaunt-rust.waivers]]
path = "src/sdks/rust/src/server.rs"
reason = "server process lifecycle requires runtime artifacts and belongs in smoke/regression lanes"
evidence = "oliphaunt-rust smoke/regression server tests"
owner = "@oliphaunt/core"
expires = "before-0.2.0"

