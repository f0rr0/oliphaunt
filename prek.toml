minimum_prek_version = "0.4.3"
default_install_hook_types = ["pre-commit", "commit-msg"]
fail_fast = true
exclude = { glob = [
  "target/**",
  "src/bindings/wasix-rust/examples/tauri-sqlx-vanilla/node_modules/**",
  "src/bindings/wasix-rust/examples/tauri-sqlx-vanilla/dist/**",
  "src/bindings/wasix-rust/examples/tauri-sqlx-vanilla/src-tauri/target/**",
] }

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"], stages = ["pre-commit"], types = ["text"] },
  { id = "end-of-file-fixer", stages = ["pre-commit"], types = ["text"] },
  { id = "check-toml", stages = ["pre-commit"] },
  { id = "check-yaml", args = ["--allow-multiple-documents"], stages = ["pre-commit"] },
  { id = "check-json", stages = ["pre-commit"], exclude = "(^|/)tsconfig\\.json$" },
  { id = "check-merge-conflict", stages = ["pre-commit"] },
  { id = "check-case-conflict", stages = ["pre-commit"] },
  { id = "check-illegal-windows-names", stages = ["pre-commit"] },
  { id = "detect-private-key", stages = ["pre-commit"], types = ["text"] },
  { id = "check-added-large-files", args = ["--maxkb=15000"], stages = ["pre-commit"] },
]

[[repos]]
repo = "https://github.com/crate-ci/committed"
rev = "v1.1.11"
hooks = [
  { id = "committed", args = ["--fixup", "--commit-file"], stages = ["commit-msg"] },
]

[[repos]]
repo = "local"
hooks = [
  { id = "cargo-fmt", name = "cargo fmt", language = "system", entry = "cargo fmt --check", pass_filenames = false, files = "\\.(rs|toml)$", stages = ["pre-commit"] },
  { id = "tauri-cargo-fmt", name = "Tauri cargo fmt", language = "system", entry = "cargo fmt --manifest-path src/bindings/wasix-rust/examples/tauri-sqlx-vanilla/src-tauri/Cargo.toml --check", pass_filenames = false, files = "^src/bindings/wasix-rust/examples/tauri-sqlx-vanilla/src-tauri/.*\\.(rs|toml)$", stages = ["pre-commit"] },
]
