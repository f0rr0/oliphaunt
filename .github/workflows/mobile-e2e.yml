name: E2E
run-name: E2E / ${{ inputs.sha || github.sha }} / ${{ inputs.platform || 'all' }}

on:
  workflow_call:
    inputs:
      sha:
        description: Commit SHA whose qualified CI build artifacts should be tested. Defaults to the caller SHA.
        required: false
        type: string
      platform:
        description: Mobile platform to test.
        required: false
        default: all
        type: string
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA whose CI build artifacts should be tested. Defaults to the current ref SHA.
        required: false
        type: string
      platform:
        description: Mobile platform to test.
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios

permissions:
  actions: read
  contents: read

concurrency:
  group: mobile-e2e-${{ inputs.sha || github.sha }}-${{ inputs.platform || 'all' }}
  cancel-in-progress: false

env:
  NODE_VERSION: 22.22.3
  PNPM_VERSION: 11.5.0
  BUN_VERSION: 1.3.14

jobs:
  resolve:
    name: resolve-build-artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      android: ${{ steps.plan.outputs.android }}
      ios: ${{ steps.plan.outputs.ios }}
      platform_jobs: ${{ steps.plan.outputs.platform_jobs }}
      run_id: ${{ steps.plan.outputs.run_id }}
      sha: ${{ steps.plan.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          ref: ${{ inputs.sha || github.sha }}
          persist-credentials: false

      - name: Set up Bun
        uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Resolve mobile app artifacts
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          INPUT_SHA: ${{ inputs.sha || '' }}
          INPUT_PLATFORM: ${{ inputs.platform || 'all' }}
          DEFAULT_SHA: ${{ github.sha }}
          BUILD_GATE_JOB: Builds
        run: bun .github/scripts/resolve-mobile-e2e.mjs

  android:
    name: android-installed-app
    needs:
      - resolve
    if: ${{ needs.resolve.outputs.android == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          ref: ${{ needs.resolve.outputs.sha }}
          persist-credentials: false

      - name: Set up Node
        id: setup_android_e2e_node
        uses: ./.github/actions/setup-node-runtime
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Reclaim Android emulator disk
        id: reclaim_android_emulator_disk
        run: node .github/scripts/reclaim-android-mobile-build-disk.mjs

      - name: Set up Android
        id: setup_android_e2e
        uses: ./.github/actions/setup-android
        with:
          gradle-cache: "false"

      - name: Set up Maestro
        uses: ./.github/actions/setup-maestro

      - name: Download Android app artifact
        id: download_android_app
        env:
          CI_HEAD_SHA: ${{ needs.resolve.outputs.sha }}
          CI_RUN_ID: ${{ needs.resolve.outputs.run_id }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          node .github/scripts/download-build-artifacts.mjs \
            CI \
            "$CI_HEAD_SHA" \
            target/mobile-build/react-native/android \
            --run-id "$CI_RUN_ID" \
            --job Builds \
            --artifact react-native-mobile-android-app-android-x86_64
          find target/mobile-build/react-native/android -maxdepth 2 -type f -print

      - name: Start Android emulator
        id: start_android_emulator
        env:
          OLIPHAUNT_ANDROID_EMULATOR_API: "35"
          OLIPHAUNT_ANDROID_EMULATOR_DISK_HEADROOM_MB: "2048"
          OLIPHAUNT_ANDROID_EMULATOR_PARTITION_SIZE_MB: "6144"
        run: tools/dev/start-android-emulator-ci.sh

      - name: Run Android installed-app E2E
        id: android_app_e2e
        env:
          CI_HEAD_SHA: ${{ needs.resolve.outputs.sha }}
          OLIPHAUNT_EXPO_ANDROID_BUILD_ARTIFACT_DIR: ${{ github.workspace }}/target/mobile-build/react-native/android
          OLIPHAUNT_EXPO_ANDROID_BUILD_TYPE: release
          OLIPHAUNT_EXPO_ANDROID_LIFECYCLE_SMOKE: "0"
          OLIPHAUNT_MOBILE_E2E_ASSERTION_RUNNER: maestro
        run: bash src/sdks/react-native/tools/mobile-e2e.sh android

      - name: Upload Android E2E reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: react-native-mobile-android-e2e-reports
          path: |
            target/mobile/react-native/android-e2e/reports
            target/mobile/react-native/android-e2e/logs
            ${{ runner.temp }}/oliphaunt-android-emulator.log
          if-no-files-found: ignore

  ios:
    name: ios-installed-app
    needs:
      - resolve
    if: ${{ needs.resolve.outputs.ios == 'true' }}
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          ref: ${{ needs.resolve.outputs.sha }}
          persist-credentials: false

      - name: Set up Node and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Set up Apple
        uses: ./.github/actions/setup-apple

      - name: Set up Maestro
        uses: ./.github/actions/setup-maestro

      - name: Download iOS app artifact
        id: download_ios_app
        env:
          CI_HEAD_SHA: ${{ needs.resolve.outputs.sha }}
          CI_RUN_ID: ${{ needs.resolve.outputs.run_id }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          node .github/scripts/download-build-artifacts.mjs \
            CI \
            "$CI_HEAD_SHA" \
            target/mobile-build/react-native/ios-transport \
            --run-id "$CI_RUN_ID" \
            --job Builds \
            --artifact react-native-mobile-ios-app

      - name: Verify and extract iOS app artifact
        id: verify_ios_app_transport
        run: |
          rm -rf target/mobile-build/react-native/ios
          node src/sdks/react-native/tools/ios-app-transport.mjs verify-extract \
            --transport-dir target/mobile-build/react-native/ios-transport \
            --output-dir target/mobile-build/react-native/ios
          find target/mobile-build/react-native/ios -maxdepth 2 -print

      - name: Run iOS installed-app E2E
        id: ios_app_e2e
        env:
          CI_HEAD_SHA: ${{ needs.resolve.outputs.sha }}
          OLIPHAUNT_EXPO_IOS_BUILD_ARTIFACT_DIR: ${{ github.workspace }}/target/mobile-build/react-native/ios
          OLIPHAUNT_EXPO_IOS_CONFIGURATION: Release
          OLIPHAUNT_EXPO_IOS_SDK: iphonesimulator
          OLIPHAUNT_EXPO_IOS_LIFECYCLE_SMOKE: "0"
          OLIPHAUNT_MOBILE_E2E_ASSERTION_RUNNER: maestro
          MAESTRO_DRIVER_STARTUP_TIMEOUT: "300000"
        run: bash src/sdks/react-native/tools/mobile-e2e.sh ios

      - name: Upload iOS E2E reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: react-native-mobile-ios-e2e-reports
          path: |
            target/mobile/react-native/ios-e2e/reports
            target/mobile/react-native/ios-e2e/logs
            target/mobile/react-native/ios-e2e/*.log
          if-no-files-found: ignore

  required:
    name: E2E
    if: ${{ always() }}
    needs:
      - resolve
      - android
      - ios
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          ref: ${{ inputs.sha || github.sha }}
          persist-credentials: false

      - name: Set up Bun
        uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Check resolver
        id: resolver_gate
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          REQUIRED_JOBS_JSON: '["resolve"]'
          GATE_LABEL: E2E resolver
        run: bun .github/scripts/check-ci-gate.mjs required

      - name: Check selected E2E platform jobs
        id: selected_platforms_gate
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          SELECTED_JOBS_JSON: ${{ needs.resolve.outputs.platform_jobs }}
          GATE_LABEL: selected E2E platform jobs
        run: bun .github/scripts/check-ci-gate.mjs selected
