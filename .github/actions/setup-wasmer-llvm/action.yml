name: Set up Wasmer LLVM
description: Restore or install the pinned Wasmer LLVM toolchain used for WASIX and AOT generation.

inputs:
  url:
    description: Wasmer LLVM archive URL.
    required: true
  sha256:
    description: Expected SHA-256 digest of the Wasmer LLVM archive.
    required: true
  bytes:
    description: Expected exact byte size of the Wasmer LLVM archive.
    required: true
  version:
    description: Expected LLVM major.minor version.
    required: false
    default: "22.1"
  cache:
    description: Whether to restore and save the extracted LLVM toolchain.
    required: false
    default: "true"
  cache-save-if:
    description: Whether to save a cache miss after installation.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Derive LLVM cache key
      id: cache-key
      shell: bash
      env:
        LLVM_URL: ${{ inputs.url }}
        LLVM_SHA256: ${{ inputs.sha256 }}
        LLVM_BYTES: ${{ inputs.bytes }}
        LLVM_VERSION: ${{ inputs.version }}
      run: |
        if [[ ! "$LLVM_URL" =~ ^https://[^[:space:]]+$ ]]; then
          echo "Wasmer LLVM URL must be a single HTTPS URL" >&2
          exit 2
        fi
        if [[ ! "$LLVM_VERSION" =~ ^[0-9]+(\.[0-9]+)+$ ]]; then
          echo "Wasmer LLVM version must contain only numeric components" >&2
          exit 2
        fi
        if [[ ! "$LLVM_SHA256" =~ ^[[:xdigit:]]{64}$ ]]; then
          echo "Wasmer LLVM SHA-256 must contain exactly 64 hexadecimal characters" >&2
          exit 2
        fi
        if [[ ! "$LLVM_BYTES" =~ ^[1-9][0-9]*$ ]] || (( LLVM_BYTES > 2147483648 )); then
          echo "Wasmer LLVM byte size must be an integer between 1 and 2147483648" >&2
          exit 2
        fi
        normalized_sha="$(printf '%s' "$LLVM_SHA256" | tr 'A-F' 'a-f')"
        if command -v shasum >/dev/null 2>&1; then
          url_hash="$(printf '%s' "$LLVM_URL" | shasum -a 256 | cut -c1-16)"
        elif command -v sha256sum >/dev/null 2>&1; then
          url_hash="$(printf '%s' "$LLVM_URL" | sha256sum | cut -c1-16)"
        else
          echo "Wasmer LLVM setup requires shasum or sha256sum" >&2
          exit 127
        fi
        echo "sha256=$normalized_sha" >> "$GITHUB_OUTPUT"
        echo "key=wasmer-llvm-${RUNNER_OS}-${RUNNER_ARCH}-${LLVM_VERSION}-${LLVM_BYTES}-${normalized_sha}-${url_hash}" >> "$GITHUB_OUTPUT"

    - name: Restore Wasmer LLVM cache
      id: cache
      if: ${{ inputs.cache == 'true' }}
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: ${{ runner.temp }}/wasmer-llvm/${{ steps.cache-key.outputs.key }}
        key: ${{ steps.cache-key.outputs.key }}

    - name: Install Wasmer LLVM
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        LLVM_URL: ${{ inputs.url }}
        LLVM_SHA256: ${{ steps.cache-key.outputs.sha256 }}
        LLVM_BYTES: ${{ inputs.bytes }}
        LLVM_VERSION: ${{ inputs.version }}
        CACHE_KEY: ${{ steps.cache-key.outputs.key }}
      run: | # zizmor: ignore[github-env] repo-owned LLVM URLs and validated tool paths are exported for later workflow steps.
        bash "$ACTION_PATH/install.sh"

    - name: Save Wasmer LLVM cache
      if: ${{ inputs.cache == 'true' && inputs.cache-save-if == 'true' && steps.cache.outputs.cache-hit != 'true' }}
      continue-on-error: true
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: ${{ runner.temp }}/wasmer-llvm/${{ steps.cache-key.outputs.key }}
        key: ${{ steps.cache-key.outputs.key }}
