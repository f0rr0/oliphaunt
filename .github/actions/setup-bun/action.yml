name: Set up Bun
description: Install the pinned Bun toolchain for TypeScript npm consumer checks.

inputs:
  bun-version:
    description: Bun version.
    required: false
    default: "1.3.14"

outputs:
  execution-envelope:
    description: Absolute digest-verified Bun execution envelope.
    value: ${{ steps.install.outputs.execution-envelope }}

runs:
  using: composite
  steps:
    - name: Install verified Bun
      id: install
      shell: bash
      env:
        BUN_VERSION_INPUT: ${{ inputs.bun-version }}
        OLIPHAUNT_PINNED_TOOL_CACHE_ROOT: ${{ runner.temp }}/oliphaunt-pinned-tools
      run: | # zizmor: ignore[github-env] the installer returns a digest- and version-verified runner-temp path.
        set -euo pipefail
        binary="$(tools/dev/install-pinned-js-runtime.sh bun --expected-version "$BUN_VERSION_INPUT")"
        binary_dir="$(dirname "$binary")"
        execution_envelope="$(cd "$binary_dir/.." && pwd -P)"
        output_envelope="$execution_envelope"
        if [[ "${RUNNER_OS:-}" == "Windows" ]]; then
          command -v cygpath >/dev/null 2>&1
          binary_dir="$(cygpath -w "$binary_dir")"
          output_envelope="$(cygpath -w "$execution_envelope")"
        fi
        echo "$binary_dir" >> "$GITHUB_PATH"
        echo "execution-envelope=$output_envelope" >> "$GITHUB_OUTPUT"
        "$binary" --version
