name: Set up Node and pnpm
description: Install the pinned Node.js and pnpm toolchain for Oliphaunt.

inputs:
  node-version:
    description: Node.js version.
    required: false
    default: "22.22.3"
  pnpm-version:
    description: pnpm version.
    required: false
    default: "11.5.0"

outputs:
  node-execution-envelope:
    description: Absolute digest-verified Node.js execution envelope.
    value: ${{ steps.node_runtime.outputs.execution-envelope }}
  pnpm-execution-envelope:
    description: Absolute digest-verified pnpm execution envelope.
    value: ${{ steps.install.outputs.execution-envelope }}

runs:
  using: composite
  steps:
    - name: Set up verified Node.js
      id: node_runtime
      uses: ./.github/actions/setup-node-runtime
      with:
        node-version: ${{ inputs.node-version }}

    - name: Restore verified pnpm archive
      id: restore_verified_pnpm_runtime
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: ${{ runner.temp }}/oliphaunt-pnpm-runtime
        key: verified-pnpm-runtime-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.prototools', '.github/actions/setup-node-pnpm/action.yml', '.github/actions/setup-node-pnpm/install-pinned-pnpm.sh', '.github/actions/setup-moon/toolchain-archive.py', 'src/sources/toolchains/pnpm.toml', 'tools/dev/curl-platform-flags.sh') }}

    - name: Install verified pnpm
      id: install
      shell: bash
      env:
        EXPECTED_NODE_VERSION: ${{ inputs.node-version }}
        EXPECTED_PNPM_VERSION: ${{ inputs.pnpm-version }}
        OLIPHAUNT_PNPM_CACHE_ROOT: ${{ runner.temp }}/oliphaunt-pnpm-runtime
      run: | # zizmor: ignore[github-env] only a fully verified runner-temp path is exported.
        set -euo pipefail
        installation="$(bash .github/actions/setup-node-pnpm/install-pinned-pnpm.sh)"
        observed_node="$(node --version)"
        observed_pnpm="$("$installation/bin/pnpm" --version)"
        if [[ "$observed_node" != "v$EXPECTED_NODE_VERSION" ]]; then
          echo "Expected Node.js v${EXPECTED_NODE_VERSION}; observed ${observed_node}" >&2
          exit 1
        fi
        if [[ "$observed_pnpm" != "$EXPECTED_PNPM_VERSION" ]]; then
          echo "Expected pnpm ${EXPECTED_PNPM_VERSION}; observed ${observed_pnpm}" >&2
          exit 1
        fi
        export_dir="$installation/bin"
        output_envelope="$installation"
        if [[ "${RUNNER_OS:-}" == "Windows" ]]; then
          command -v cygpath >/dev/null 2>&1
          export_dir="$(cygpath -w "$export_dir")"
          output_envelope="$(cygpath -w "$installation")"
        fi
        echo "$export_dir" >> "$GITHUB_PATH"
        echo "execution-envelope=$output_envelope" >> "$GITHUB_OUTPUT"

    - name: Save verified pnpm archive
      if: ${{ env.HEAVY_CACHE_SAVE_IF == 'true' && steps.restore_verified_pnpm_runtime.outputs.cache-hit != 'true' }}
      continue-on-error: true
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: ${{ runner.temp }}/oliphaunt-pnpm-runtime
        key: verified-pnpm-runtime-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.prototools', '.github/actions/setup-node-pnpm/action.yml', '.github/actions/setup-node-pnpm/install-pinned-pnpm.sh', '.github/actions/setup-moon/toolchain-archive.py', 'src/sources/toolchains/pnpm.toml', 'tools/dev/curl-platform-flags.sh') }}
