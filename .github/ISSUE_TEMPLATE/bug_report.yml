name: Bug report
description: Report incorrect Oliphaunt behavior in a product, SDK, runtime, or tool.
title: "bug: "
labels: ["bug"]
body:
  - type: dropdown
    id: product
    attributes:
      label: Product area
      description: Which product or surface is affected?
      options:
        - liboliphaunt
        - Rust SDK
        - Swift SDK
        - Kotlin SDK
        - React Native SDK
        - TypeScript SDK
        - WASM/WASIX runtime
        - Repo tooling / CI / release
        - Documentation
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal code, commands, SQL, or app steps that reproduce the issue.
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Oliphaunt package versions, platform versions, OS, architecture, and relevant toolchain versions.
    validations:
      required: true
