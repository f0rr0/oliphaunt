$schema: "https://moonrepo.dev/schemas/project.json"

id: "ci-workflows"
language: "yaml"
layer: "configuration"
stack: "infrastructure"
tags: ["ci", "github-actions", "workflows"]

project:
  title: "GitHub Actions"
  description: "GitHub workflow, action, and repository automation checks."
  owner: "oliphaunt"

owners:
  defaultOwner: "@oliphaunt/core"
  paths:
    "**/*": ["@oliphaunt/core"]

tasks:
  check:
    tags: ["policy", "assertion", "quality", "static", "ci-maintainer-tools"]
    command: "bash tools/policy/check-workflows.sh"
    inputs:
      - "/.moon/toolchains.yml"
      - "/.prototools"
      - "/.github/actions/**/*"
      - "/.github/scripts/**/*"
      - "/.github/workflows/**/*"
      - "/.github/zizmor.yml"
      - "/src/sources/toolchains/**/*"
      - "/tools/dev/bun.sh"
      - "/tools/dev/curl-platform-flags.sh"
      - "/tools/dev/extract-pinned-zip.sh"
      - "/tools/dev/extract-pinned-zip.test.sh"
      - "/tools/dev/install-pinned-js-runtime.sh"
      - "/tools/dev/install-pinned-js-runtime.test.sh"
      - "/tools/dev/install-pinned-winflexbison.sh"
      - "/tools/dev/install-pinned-winflexbison.test.sh"
      - "/tools/dev/setup-android-sdk.sh"
      - "/tools/dev/setup-android-sdk.test.sh"
      - "/tools/dev/start-android-emulator-ci.sh"
      - "/tools/dev/start-android-emulator-ci.test.sh"
      - "/tools/policy/check-workflows.sh"
      - "/tools/release/install-verdaccio-runtime.sh"
      - "/tools/release/install-verdaccio-runtime.test.sh"
      - "/tools/release/toolchain-bootstrap.test.mjs"
      - "/tools/release/verdaccio-runtime/package.json"
      - "/tools/release/verdaccio-runtime/pnpm-lock.yaml"
    options:
      cache: true
      runFromWorkspaceRoot: true
  release-check:
    tags: ["release", "package"]
    command: "true"
    deps:
      - "ci-workflows:check"
    options:
      cache: true
      runFromWorkspaceRoot: true
