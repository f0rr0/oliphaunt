schema = "oliphaunt-release-semantic-inputs-v1"

# Rules in this file own shared inputs that can change published bytes or a
# public target/support contract. Validators, tests, workflows, and registry
# transport orchestration deliberately do not belong here.

[[rules]]
id = "cargo-workspace-build-inputs"
paths = ["Cargo.lock", "Cargo.toml", "rust-toolchain.toml"]
products = [
  "liboliphaunt-native",
  "liboliphaunt-wasix",
  "oliphaunt-broker",
  "oliphaunt-rust",
  "oliphaunt-wasix-rust",
]
product_kinds = ["exact-extension-artifact", "exact-extension-bundle"]

[[rules]]
id = "javascript-workspace-build-inputs"
paths = ["package.json", "pnpm-lock.yaml", "pnpm-workspace.yaml"]
products = ["oliphaunt-js", "oliphaunt-react-native"]

[[rules]]
id = "extension-artifact-carrier-producers"
# Frozen npm/Cargo carrier bytes live in the focused materializer. The
# local-registry publisher remains transport-only and deliberately has no
# release-semantic owner.
paths = [
  "src/extensions/artifacts/native/tools/**",
  "src/extensions/artifacts/packages/tools/**",
  "src/extensions/artifacts/wasix/tools/**",
  "src/sdks/rust/extension-artifact-archive-policy.properties",
  "tools/release/bounded-gunzip-to-file.mjs",
  "tools/release/build-extension-ci-artifacts.mjs",
  "tools/release/extension-artifact-archive-policy.mjs",
  "tools/release/extension-artifact-inventory.mjs",
  "tools/release/extension-registry-carrier-materializer.mjs",
  "tools/release/extension-registry-packages.mjs",
  "tools/release/extension-runtime-asset-contract.mjs",
  "tools/release/npm-trusted-publishing.mjs",
  "tools/release/package-extension-cargo-facades.mjs",
]
product_kinds = ["exact-extension-artifact", "exact-extension-bundle"]

[[rules]]
id = "apple-carrier-manifest-producer"
# This renderer creates both independent extension carrier assets and the
# selection-neutral carrier embedded in the Swift source tree and React Native
# npm package.
paths = ["tools/release/ios-carrier-manifest.mjs"]
products = ["oliphaunt-swift", "oliphaunt-react-native"]
product_kinds = ["exact-extension-artifact", "exact-extension-bundle"]

[[rules]]
id = "wasix-release-asset-rust-producers"
# The xtask release command stages, rewrites, and deterministically archives
# the public WASIX runtime carriers under target/oliphaunt-wasix/release-assets.
paths = [
  "tools/xtask/Cargo.toml",
  "tools/xtask/src/aot_serializer.rs",
  "tools/xtask/src/asset_checks.rs",
  "tools/xtask/src/asset_manifest.rs",
  "tools/xtask/src/asset_pipeline.rs",
  "tools/xtask/src/extension_catalog.rs",
  "tools/xtask/src/fs_utils.rs",
  "tools/xtask/src/main.rs",
  "tools/xtask/src/postgres_guard.rs",
  "tools/xtask/src/release_workspace.rs",
  "tools/xtask/src/source_spine.rs",
  "tools/xtask/src/template_runner.rs",
]
products = ["liboliphaunt-wasix"]

[[rules]]
id = "wasix-generated-extension-runtime-inputs"
# The WASIX portable runtime carrier copies src/extensions/generated wholesale.
# Keep the SDK catalogs that have additional byte owners in separate exact
# rules below so ownership patterns remain non-overlapping.
paths = [
  "src/extensions/generated/contrib-build.tsv",
  "src/extensions/generated/docs/**",
  "src/extensions/generated/extensions.build-plan.json",
  "src/extensions/generated/extensions.catalog.json",
  "src/extensions/generated/mobile/**",
  "src/extensions/generated/pgxs-build.tsv",
  "src/extensions/generated/sdk/js.json",
  "src/extensions/generated/sdk/react-native.json",
  "src/extensions/generated/sdk/rust.json",
  "src/extensions/generated/wasix/**",
]
products = ["liboliphaunt-wasix"]

[[rules]]
id = "extension-kotlin-runtime-catalog"
paths = ["src/extensions/generated/sdk/kotlin.json"]
products = ["liboliphaunt-wasix"]
product_kinds = ["exact-extension-artifact", "exact-extension-bundle"]

[[rules]]
id = "swift-extension-owner-catalog"
paths = ["src/extensions/generated/sdk/swift.json"]
products = ["liboliphaunt-wasix", "oliphaunt-swift"]

[[rules]]
id = "native-npm-carrier-producer"
# This mixed helper directly assembles and packs the frozen native-runtime and
# broker npm tarballs. Its other branches only validate staged bytes or invoke
# focused byte producers that have their own semantic ownership rules.
paths = ["tools/release/release-product-dry-run.mjs"]
products = [
  "liboliphaunt-native",
  "oliphaunt-broker",
]

[[rules]]
id = "maven-runtime-extension-carrier-producer"
paths = ["tools/release/build_maven_artifact_manifest.mjs"]
products = ["liboliphaunt-native"]
product_kinds = ["exact-extension-artifact", "exact-extension-bundle"]

[[rules]]
id = "native-cargo-carrier-producer"
paths = ["tools/release/package-liboliphaunt-cargo-artifacts.mjs"]
products = ["liboliphaunt-native"]

[[rules]]
id = "broker-cargo-carrier-producer"
paths = ["tools/release/package_broker_cargo_artifacts.mjs"]
products = ["oliphaunt-broker"]

[[rules]]
id = "wasix-runtime-extension-cargo-carrier-producer"
paths = ["tools/release/package_liboliphaunt_wasix_cargo_artifacts.mjs"]
products = ["liboliphaunt-wasix"]
product_kinds = ["exact-extension-artifact", "exact-extension-bundle"]

[[rules]]
id = "shared-cargo-source-archive-producer"
paths = ["tools/release/cargo-source-package.mjs"]
products = ["oliphaunt-rust", "oliphaunt-wasix-rust"]
product_kinds = ["exact-extension-artifact", "exact-extension-bundle"]

[[rules]]
id = "sdk-package-producers"
paths = ["tools/release/build-sdk-ci-artifacts.mjs"]
product_kinds = ["sdk"]

[[rules]]
id = "canonical-public-product-target-contract"
paths = ["tools/release/release-artifact-targets.mjs"]
product_kinds = [
  "native-core",
  "wasm-runtime",
  "runtime",
  "sdk",
  "exact-extension-artifact",
  "exact-extension-bundle",
]

[[rules]]
id = "published-binary-compatibility-contract"
paths = ["tools/release/platform-compatibility-policy.mjs"]
products = [
  "liboliphaunt-native",
  "liboliphaunt-wasix",
  "oliphaunt-broker",
  "oliphaunt-node-direct",
]
product_kinds = ["exact-extension-artifact", "exact-extension-bundle"]

[[rules]]
id = "shared-native-archive-encoder"
paths = ["tools/release/archive_dir.mjs"]
products = ["liboliphaunt-native", "oliphaunt-broker", "oliphaunt-node-direct"]

[[rules]]
id = "canonical-native-c-abi-header"
# Node direct compiles this canonical runtime header into its addon. Native
# owns the path directly; this edge adds the cross-product byte dependency.
paths = ["src/runtimes/liboliphaunt/native/include/oliphaunt.h"]
products = ["oliphaunt-node-direct"]

[[rules]]
id = "native-runtime-release-asset-producers"
paths = [
  "tools/release/package-liboliphaunt-aggregate-assets.sh",
  "tools/release/package-liboliphaunt-icu-data.sh",
  "tools/release/package-liboliphaunt-linux-assets.sh",
  "tools/release/package-liboliphaunt-macos-assets.sh",
  "tools/release/package-liboliphaunt-mobile-assets.sh",
  "tools/release/package-liboliphaunt-windows-assets.ps1",
  "tools/release/optimize_native_runtime_payload.mjs",
]
products = ["liboliphaunt-native"]

[[rules]]
id = "native-runtime-resource-rust-producers"
# The selection-neutral runtime-resources carrier is emitted by the Rust SDK's
# oliphaunt-resources binary during native iOS asset packaging. Own only the
# CLI, renderer, and native runtime/template materialization closure that can
# alter those bytes; extension-index/artifact helpers and unrelated SDK runtime
# behavior remain Rust-SDK-only inputs.
paths = [
  "src/sdks/rust/src/bin/package_resources.rs",
  "src/sdks/rust/src/build_resources.rs",
  "src/sdks/rust/src/config.rs",
  "src/sdks/rust/src/extension.rs",
  "src/sdks/rust/src/generated/extensions.rs",
  "src/sdks/rust/src/lib.rs",
  "src/sdks/rust/src/liboliphaunt/ffi.rs",
  "src/sdks/rust/src/liboliphaunt/mod.rs",
  "src/sdks/rust/src/liboliphaunt/root.rs",
  "src/sdks/rust/src/liboliphaunt/root/extensions.rs",
  "src/sdks/rust/src/liboliphaunt/root/files.rs",
  "src/sdks/rust/src/liboliphaunt/root/fingerprint.rs",
  "src/sdks/rust/src/liboliphaunt/root/runtime.rs",
  "src/sdks/rust/src/liboliphaunt/root/runtime/**",
  "src/sdks/rust/src/liboliphaunt/root/template.rs",
  "src/sdks/rust/src/runtime_resources.rs",
  "src/sdks/rust/src/runtime_resources/package.rs",
  "src/sdks/rust/src/runtime_resources/static_registry.rs",
]
products = ["liboliphaunt-native"]

[[rules]]
id = "broker-release-asset-producers"
paths = [
  "tools/release/build-linux-broker-baseline.sh",
  "tools/release/package-broker-assets.sh",
]
products = ["oliphaunt-broker"]

[[rules]]
id = "native-release-binary-byte-postprocessing"
paths = ["tools/release/strip_native_release_binaries.mjs"]
products = ["liboliphaunt-native", "oliphaunt-broker", "oliphaunt-node-direct"]
product_kinds = ["exact-extension-artifact", "exact-extension-bundle"]

[[rules]]
id = "native-release-symlink-materialization"
paths = ["tools/release/materialize-release-symlinks.mjs"]
products = ["liboliphaunt-native"]
product_kinds = ["exact-extension-artifact", "exact-extension-bundle"]

[[rules]]
id = "windows-release-runtime-closure"
paths = [
  "tools/release/native-runtime-payload-policy.json",
  "tools/release/windows-vc-runtime-closure.mjs",
]
products = ["liboliphaunt-native", "oliphaunt-broker"]
product_kinds = ["exact-extension-artifact", "exact-extension-bundle"]

[[rules]]
id = "runtime-release-checksum-producer"
paths = ["tools/release/write_checksum_manifest.mjs"]
products = [
  "liboliphaunt-native",
  "liboliphaunt-wasix",
  "oliphaunt-broker",
  "oliphaunt-node-direct",
]

[[rules]]
id = "swiftpm-release-source-renderer"
paths = ["tools/release/render_swiftpm_release_package.mjs"]
products = ["oliphaunt-swift"]

[[rules]]
id = "rust-sdk-source-producer"
paths = ["tools/release/prepare-rust-release-source.mjs"]
products = ["oliphaunt-rust"]

[[rules]]
id = "wasix-rust-sdk-source-producer"
paths = ["tools/release/package_oliphaunt_wasix_sdk_crate.mjs"]
products = ["oliphaunt-wasix-rust"]

[[rules]]
id = "shared-release-archive-transport"
paths = ["tools/release/tar-command.mjs"]
products = ["liboliphaunt-native", "liboliphaunt-wasix", "oliphaunt-broker"]
product_kinds = ["exact-extension-artifact", "exact-extension-bundle"]
