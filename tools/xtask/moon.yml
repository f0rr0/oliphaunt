$schema: "https://moonrepo.dev/schemas/project.json"

id: "xtask"
language: "rust"
layer: "tool"
stack: "systems"
tags: ["tools", "rust", "xtask", "wasm"]

project:
  title: "xtask"
  description: "Rust helper binary for WASM assets, release staging, and source-policy checks."
  owner: "oliphaunt"

owners:
  defaultOwner: "@oliphaunt/wasm"
  paths:
    "**/*.rs": ["@oliphaunt/wasm"]
    "Cargo.toml": ["@oliphaunt/wasm"]

tasks:
  check:
    tags: ["quality", "static"]
    command: "cargo check -p xtask --locked"
    env:
      CARGO_TARGET_DIR: "target/moon/xtask/check"
    inputs:
      - "/Cargo.lock"
      - "/Cargo.toml"
      - "/rust-toolchain.toml"
      - "/tools/xtask/**/*"
    options:
      cache: true
      runFromWorkspaceRoot: true
  template-runner-check:
    tags: ["quality", "static", "wasix"]
    command: "cargo check -p xtask --features template-runner --locked"
    env:
      CARGO_TARGET_DIR: "target/moon/xtask/template-runner-check"
    inputs:
      - "/Cargo.lock"
      - "/Cargo.toml"
      - "/rust-toolchain.toml"
      - "/tools/xtask/**/*"
    options:
      cache: true
      runFromWorkspaceRoot: true
      runInCI: skip
  release-check:
    tags: ["release", "package"]
    command: "cargo check -p xtask --features aot-serializer --locked"
    env:
      CARGO_TARGET_DIR: "target/moon/xtask/release-check"
    inputs:
      - "/Cargo.lock"
      - "/Cargo.toml"
      - "/rust-toolchain.toml"
      - "/tools/xtask/**/*"
    options:
      cache: true
      runFromWorkspaceRoot: true
