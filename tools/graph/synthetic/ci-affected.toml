# Exact path-to-CI planning contracts. Ownership-only matches for historical or
# generated evidence must stay policy-only, while real extension source and
# recipe changes must retain the full publication and lifecycle proof closure.

[cases.transitional_extension_evidence]
path = "src/extensions/evidence/runs/2026-06-07-transitional-catalog-smoke.json"
forbid_builders = true
forbidden_jobs = [
    "native-extension-lifecycle",
    "native-extension-lifecycle-aggregate",
    "rust-sdk-exact-candidate-consumer",
    "wasix-rust-exact-candidate-consumer",
]

[cases.generated_extension_evidence]
path = "src/extensions/generated/docs/extension-evidence.json"
forbid_builders = true
forbidden_jobs = [
    "native-extension-lifecycle",
    "native-extension-lifecycle-aggregate",
    "rust-sdk-exact-candidate-consumer",
    "wasix-rust-exact-candidate-consumer",
]

[cases.external_extension_source]
path = "src/extensions/external/vector/source.toml"
required_jobs = [
    "extension-artifacts-native",
    "extension-artifacts-wasix",
    "extension-packages",
    "native-extension-lifecycle",
]

[cases.external_extension_recipe]
path = "src/extensions/external/postgis/targets/native.toml"
required_jobs = [
    "extension-artifacts-native",
    "extension-artifacts-wasix",
    "extension-packages",
    "native-extension-lifecycle",
]

[cases.wasix_rust_candidate]
path = "src/bindings/wasix-rust/crates/oliphaunt-wasix/src/protocol/types.rs"
required_jobs = [
    "wasix-rust-package",
    "liboliphaunt-wasix-runtime",
    "liboliphaunt-wasix-aot",
    "liboliphaunt-wasix-release-assets",
    "wasix-rust-exact-candidate-consumer",
]

[cases.wasix_rust_exact_candidate_consumer_tool]
path = "tools/release/wasix-rust-exact-candidate-consumer.mjs"
required_jobs = [
    "extension-artifacts-wasix",
    "wasix-rust-package",
    "liboliphaunt-wasix-runtime",
    "liboliphaunt-wasix-aot",
    "liboliphaunt-wasix-release-assets",
    "wasix-rust-exact-candidate-consumer",
]

[cases.exact_cargo_candidate_consumer_tool]
path = "tools/release/exact-cargo-candidate-consumer.mjs"
required_jobs = [
    "extension-artifacts-wasix",
    "wasix-rust-package",
    "liboliphaunt-wasix-runtime",
    "liboliphaunt-wasix-aot",
    "liboliphaunt-wasix-release-assets",
    "wasix-rust-exact-candidate-consumer",
]

# Simulated single-file mutations for every JavaScript exact-candidate trigger
# input. Each case traverses Moon affectedness and the CI planner, so removing
# either an input edge or the explicit planner trigger fails closed.
[cases.js_exact_candidate_consumer_tool]
path = "tools/release/js-exact-candidate-consumer.mjs"
required_jobs = [
    "broker-runtime",
    "extension-artifacts-native",
    "js-sdk-exact-candidate-consumer",
    "js-sdk-package",
    "liboliphaunt-native-desktop",
    "liboliphaunt-native-ios",
