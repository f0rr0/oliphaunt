required_jobs = [
    "wasix-rust-package",
    "liboliphaunt-wasix-runtime",
    "liboliphaunt-wasix-aot",
    "liboliphaunt-wasix-release-assets",
    "wasix-rust-exact-candidate-consumer",
]

[cases.wasix_rust_exact_candidate_consumer_tool]
path = "tools/release/wasix-rust-exact-candidate-consumer.mjs"
